<!DOCTYPE html>
<html>
<head>
    <title>Installer Portal v4.1.0-CLEAN</title>

    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; }
        .box { border: 2px solid #0f0; padding: 20px; margin: 10px 0; }
        button { background: #0f0; color: #000; border: none; padding: 10px 20px; margin: 5px; cursor: pointer; font-family: monospace; }
        button:hover { background: #fff; }
        .job { background: rgba(0,255,0,0.1); padding: 10px; margin: 10px 0; border: 1px solid #0f0; }
        input { background: #000; border: 1px solid #0f0; color: #0f0; padding: 8px; margin: 5px 0; width: 100%; }
        .version { position: fixed; bottom: 10px; right: 10px; font-size: 10px; opacity: 0.7; }
        
        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            overflow-y: auto;
        }
        
        .modal-content {
            background-color: #000;
            border: 2px solid #0f0;
            margin: 20px auto;
            padding: 20px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }
        
        .modal-close {
            position: absolute;
            top: 10px;
            right: 15px;
            color: #f00;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            font-family: monospace;
        }
        
        .modal-close:hover {
            color: #fff;
        }
        
        @media (max-width: 768px) {
            .modal-content {
                width: 95%;
                margin: 10px auto;
                padding: 15px;
            }
        }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            .box {
                margin: 10px;
                padding: 15px;
            }
            
            .terminal-button {
                width: 100%;
                margin: 5px 0;
                padding: 12px 16px;
                font-size: 14px;
            }
            
            .job {
                margin: 10px 0;
                padding: 15px;
            }
            
            .installer-stats {
                grid-template-columns: 1fr !important;
                gap: 10px !important;
            }
            
            .job-actions {
                display: flex;
                flex-direction: column;
                gap: 8px;
            }
            
            .job-actions button {
                width: 100%;
                padding: 12px;
                font-size: 14px;
            }
            
            .photo-section {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
            
            .photo-section button {
                width: 100%;
                padding: 12px;
                font-size: 14px;
            }
            
            .signature-canvas {
                width: 100% !important;
                height: 200px !important;
            }
            
            .status-buttons {
                display: grid;
                grid-template-columns: 1fr 1fr !important;
                gap: 8px;
            }
            
            .status-buttons button {
                padding: 12px 8px;
                font-size: 13px;
            }
        }
        
        @media (min-width: 769px) {
            .installer-stats {
                grid-template-columns: repeat(3, 1fr);
            }
            
            .job-actions {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 10px;
            }
        }
    </style>
</head>

    <script>
        // Firebase setup
        firebase.initializeApp({

                        <div style="border: 2px solid #0f0; padding: 20px;">

            // Load dashboard stats

        async function loadDashboardStats() {
            try {
                // Get installers count
                const installersSnapshot = await db.collection('installers').get();
                document.getElementById('totalInstallers').textContent = installersSnapshot.size;
                
                // Get jobs count
                const jobsSnapshot = await db.collection('jobs').get();
                document.getElementById('totalJobs').textContent = jobsSnapshot.size;
                
                // Calculate pending installers
                const jobs = jobsSnapshot.docs.map(doc => doc.data());
                const installerMap = new Map();
                
                jobs.forEach(job => {
                    if (job.installer && job.installerId) {
                        installerMap.set(job.installerId, job.installer);
                    }
                });
                
                const provisionedIds = new Set();
                installersSnapshot.docs.forEach(doc => {
                    const installer = doc.data();
                    if (installer.teamupId) {
                        provisionedIds.add(String(installer.teamupId));
                    }
                });
                
                const pendingCount = Array.from(installerMap.keys())
                    .filter(id => !provisionedIds.has(String(id))).length;
                
                document.getElementById('pendingInstallers').textContent = pendingCount;
                
            } catch (error) {
                console.error('Error loading dashboard stats:', error);
            }
        }

        async function quickSync() {
            if (!confirm('Start quick TeamUp sync?')) return;
            
            try {
                const apiKey = localStorage.getItem('teamupApiKey') || '';
                const calendarId = localStorage.getItem('teamupCalendarId') || '';
                
                if (!apiKey || !calendarId) {
                    alert('TeamUp settings not configured');
                    return;
                }
                
                // Simple sync (reuse existing logic)
                const today = new Date();
                const startDate = today.toISOString().split('T')[0];
                const endDate = new Date(today.getTime() + 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
                
                const eventsResponse = await fetch(
                    `https://api.teamup.com/${calendarId}/events?startDate=${startDate}&endDate=${endDate}&limit=50`,
                    { headers: { 'Teamup-Token': apiKey } }
                );
                
                if (!eventsResponse.ok) throw new Error('Sync failed');
                
                const eventsData = await eventsResponse.json();
                let syncedCount = 0;
                
                for (const event of eventsData.events) {
                    if (event.subcalendar_ids && event.subcalendar_ids.length > 0) {
                        const installerId = event.subcalendar_ids[0];
                        const job = {
                            title: event.title,
                            customer: event.who || 'Customer',
                            address: event.location || 'No address',
                            start_dt: event.start_dt,
                            end_dt: event.end_dt,
                            installer: `Installer ${installerId}`,
                            installerId: installerId,
                            status: 'not_started',
                            teamup_id: event.id
                        };
                        
                        const existing = await db.collection('jobs')
                            .where('teamup_id', '==', event.id)
                            .limit(1)
                            .get();
                        
                        if (existing.empty) {
                            await db.collection('jobs').add(job);
                            syncedCount++;
                        }
                    }
                }
                
                alert(`✅ Quick sync complete! Synced ${syncedCount} jobs.`);
                loadDashboardStats(); // Refresh stats
                
            } catch (error) {
                alert('❌ Quick sync failed: ' + error.message);
            }
        }

        function showLogin() {
            document.getElementById('content').innerHTML = `

                    <input type="text" id="token" placeholder="Enter token">
                    <button onclick="login()">🔐 Login</button>
                    <button onclick="showHome()">🏠 Home</button>
                </div>
            `;
        }

        async function login() {
            const token = document.getElementById('token').value.trim();
            if (!token) {
                alert('Please enter a token');
                return;
            }
            
            try {
                // Find installer by token
                const installerSnapshot = await db.collection('installers')
                    .where('token', '==', token)
                    .get();
                
                if (installerSnapshot.empty) {
                    alert('Invalid token. Please check your token and try again.');
                    return;
                }
                
                const installer = installerSnapshot.docs[0].data();
                showInstallerPortal(installer);
                
            } catch (error) {
                console.error('Login error:', error);
                alert('Login failed. Please try again.');
            }
        }

            console.log('🔧 Loading installer portal for:', installer.name);
            
            document.getElementById('content').innerHTML = `

                    <!-- Installer Stats -->

                        </div>

                    <!-- Calendar View -->

                        <div style="margin-top: 10px;">
                            <button onclick="loadInstallerCalendar('${installer.teamupId || installer.id}')" style="background: #ffa500; color: #000;">🔄 Refresh Calendar</button>
                        </div>
                    </div>
                </div>
            `;
            
            // Load installer data
            loadInstallerStats(installer);

            // Check for persisted job and restore it in modal

                setTimeout(() => {

        async function loadInstallerStats(installer) {
            try {
                // Get jobs assigned to this installer
                const jobsSnapshot = await db.collection('jobs')
                    .where('installerId', '==', installer.teamupId || installer.id)
                    .get();
                
                const jobs = jobsSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                const total = jobs.length;
                const completed = jobs.filter(job => job.status === 'completed').length;
                const inProgress = jobs.filter(job => job.status === 'in_progress').length;
                
                document.getElementById('installerJobCount').textContent = total;
                document.getElementById('installerCompletedCount').textContent = completed;
                document.getElementById('installerInProgressCount').textContent = inProgress;
                
            } catch (error) {
                console.error('Error loading installer stats:', error);
                document.getElementById('installerJobCount').textContent = 'Error';
                document.getElementById('installerCompletedCount').textContent = 'Error';
                document.getElementById('installerInProgressCount').textContent = 'Error';
            }
        }

        async function loadInstallerCalendar(installer) {
            try {
                // Try multiple ways to find jobs for this installer
                let jobsSnapshot;
                
                // First try by teamupId
                if (installer.teamupId) {
                    console.log('🔍 Querying by teamupId:', installer.teamupId);
                    jobsSnapshot = await db.collection('jobs')
                        .where('installerId', '==', installer.teamupId)
                        .get();
                }
                
                // If no teamupId or no jobs found, try by name
                if (!installer.teamupId || jobsSnapshot.empty) {
                    console.log('🔍 Querying by installer name:', installer.name);
                    jobsSnapshot = await db.collection('jobs')
                        .where('installer', '==', installer.name)
                        .get();
                }
                
                // If still no jobs, try by email as fallback
                if (jobsSnapshot.empty) {
                    console.log('🔍 No jobs found, checking if installer has any assigned jobs...');
                    const allJobsSnapshot = await db.collection('jobs').get();
                    const allJobs = allJobsSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    
                    // Look for any jobs that might belong to this installer
                    const possibleJobs = allJobs.filter(job => {
                        return job.installerId === installer.id || 
                               job.installer === installer.name ||
                               job.installer?.toLowerCase().includes(installer.name.toLowerCase()) ||
                               installer.email && job.customer?.toLowerCase().includes(installer.email.toLowerCase());
                    });
                    
                    if (possibleJobs.length > 0) {
                        console.log(`🔍 Found ${possibleJobs.length} possible jobs for ${installer.name}`);
                        // Create a mock snapshot for these jobs
                        jobsSnapshot = {
                            empty: false,
                            docs: possibleJobs.map(job => ({ id: job.id, data: () => job }))
                        };
                    }
                }
                
                const jobs = jobsSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                console.log(`📊 Found ${jobs.length} jobs for ${installer.name}`);
                
                // Group jobs by date
                const jobsByDate = {};
                jobs.forEach(job => {
                    if (job.start_dt) {
                        const date = new Date(job.start_dt).toDateString();
                        if (!jobsByDate[date]) {
                            jobsByDate[date] = [];
                        }
                        jobsByDate[date].push(job);
                    }
                });
                
                // Create calendar HTML
                let calendarHTML = '<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px;">';
                
                Object.keys(jobsByDate).sort().forEach(date => {
                    const dayJobs = jobsByDate[date];
                    const statusColors = {
                        'not_started': '#f00',
                        'in_progress': '#ffa500',
                        'completed': '#0f0'
                    };
                    
                    calendarHTML += `
                        <div class="job" style="border-left: 4px solid #0f0;">
                            <h4 style="margin-top: 0; margin-bottom: 5px;">${date}</h4>
                            ${dayJobs.map(job => `
                                <div style="margin-bottom: 8px; padding: 8px; background: rgba(0,255,0,0.1); border-left: 3px solid ${statusColors[job.status] || '#0f0'};">
                                    <strong>${job.title}</strong><br>
                                    <small>${job.customer}</small><br>
                                    <small>${job.address}</small><br>
                                    <small>Status: ${job.status}</small><br>
                                    <button onclick="showJobDetails('${job.id}')" style="background: #0f0; color: #000; border: none; padding: 4px 8px; cursor: pointer; font-size: 11px; margin-top: 5px;">
                                        📋 Details
                                    </button>
                                </div>
                            `).join('')}
                        </div>
                    `;
                });
                
                calendarHTML += '</div>';
                
                if (Object.keys(jobsByDate).length === 0) {
                    calendarHTML = `
                        <div style="text-align: center; padding: 20px;">
                            <h4>📅 No Jobs Found</h4>
                            <p>No jobs are currently assigned to ${installer.name}.</p>
                            <p>This could mean:</p>
                            <ul style="text-align: left; display: inline-block;">
                                <li>No jobs have been synced from TeamUp yet</li>
                                <li>Jobs are assigned to a different installer</li>
                                <li>Installer data needs to be updated</li>
                            </ul>
                            <div style="margin-top: 15px;">
                                <button onclick="loadInstallerCalendar('${installer.teamupId || installer.id}')" style="background: #ffa500; color: #000;">🔄 Refresh Calendar</button>
                            </div>
                        </div>
                    `;
                }
                
                document.getElementById('installerCalendar').innerHTML = calendarHTML;
                
            } catch (error) {
                console.error('Error loading calendar:', error);
                document.getElementById('installerCalendar').innerHTML = `
                    <div style="text-align: center; padding: 20px;">
                        <h4>❌ Calendar Error</h4>
                        <p>Failed to load calendar: ${error.message}</p>
                        <button onclick="loadInstallerCalendar('${installer.teamupId || installer.id}')" style="background: #f00; color: #fff;">🔄 Try Again</button>
                    </div>
                `;
            }
        }

                        </div>
                        <div id="photoSection_${jobId}"></div>
                    </div>
                    
                    <!-- CO2 Detection Section -->
                    <div style="border: 1px solid #0f0; padding: 15px; margin: 15px 0;">
                        <h4 style="margin-top: 0;">🧪 CO2 Detection</h4>
                        <div class="job-actions" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px;">
                            <button onclick="recordCO2('${jobId}', 'pass')" style="background: #0f0; color: #000;">✅ CO2 Pass</button>
                            <button onclick="recordCO2('${jobId}', 'fail')" style="background: #f00; color: #fff;">❌ CO2 Fail</button>
                            <button onclick="recordCO2('${jobId}', 'retest')" style="background: #ffa500; color: #000;">🔄 CO2 Retest</button>
                        </div>
                        <div id="co2Section_${jobId}"></div>
                    </div>
                    
                    <!-- Walk-through Section -->
                    <div style="border: 1px solid #0f0; padding: 15px; margin: 15px 0;">
                        <h4 style="margin-top: 0;">👤 Customer Walk-through</h4>

            `;
            
            // Initialize signature canvas
            setTimeout(() => {
                const canvas = document.getElementById(`signatureCanvas_${jobId}`);
                const ctx = canvas.getContext('2d');
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                
                let drawing = false;
                canvas.addEventListener('mousedown', () => drawing = true);
                canvas.addEventListener('mouseup', () => drawing = false);
                canvas.addEventListener('mousemove', (e) => {
                    if (!drawing) return;
                    const rect = canvas.getBoundingClientRect();
                    ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
                    ctx.stroke();
                });
            }, 100);
        }

        async function loadPendingInstallers() {
            try {
                // Get jobs to find installers
                const jobsSnapshot = await db.collection('jobs').get();
                const installerMap = new Map();
                
                jobsSnapshot.docs.forEach(doc => {
                    const job = doc.data();
                    if (job.installer && job.installerId) {
                        if (!installerMap.has(job.installerId)) {
                            installerMap.set(job.installerId, {
                                id: job.installerId,
                                name: job.installer,
                                jobCount: 0,
                                jobs: []
                            });
                        }
                        const installer = installerMap.get(job.installerId);
                        installer.jobCount++;
                        installer.jobs.push(job.title);
                    }
                });
                
                // Get already provisioned installers
                const installersSnapshot = await db.collection('installers').get();
                const provisionedIds = new Set();
                
                installersSnapshot.docs.forEach(doc => {
                    const installer = doc.data();
                    if (installer.teamupId) {
                        provisionedIds.add(String(installer.teamupId));
                    }
                });
                
                // Find pending installers
                const pendingInstallers = Array.from(installerMap.values())
                    .filter(installer => !provisionedIds.has(String(installer.id)));
                
                let html = '';
                if (pendingInstallers.length === 0) {
                    html = '<p>No pending installers found. All installers from jobs are provisioned.</p>';
                } else {
                    html = `<p>Found ${pendingInstallers.length} installers from jobs that need provisioning:</p>`;
                    pendingInstallers.forEach(installer => {
                        html += `
                            <div class="job">
                                <strong>${installer.name}</strong><br>
                                ID: ${installer.id}<br>
                                Jobs: ${installer.jobCount}<br>
                                <button onclick="provisionPendingInstaller('${installer.id}', '${installer.name.replace(/'/g, "\\'")}', 'Found in ${installer.jobCount} jobs')" style="margin-top: 8px;">👤 Provision Installer</button>
                            </div>
                        `;
                    });
                }
                
                document.getElementById('installerContent').innerHTML = html;
                
            } catch (error) {
                console.error('Error loading pending installers:', error);
                document.getElementById('installerContent').innerHTML = '<p style="color: #f00;">Error loading pending installers</p>';
            }
        }

        async function startTeamUpSync() {
            document.getElementById('syncStatus').innerHTML = '<p>🔄 Starting sync...</p>';
            
            try {
                const apiKey = localStorage.getItem('teamupApiKey') || '';
                const calendarId = localStorage.getItem('teamupCalendarId') || '';
                
                if (!apiKey || !calendarId) {
                    document.getElementById('syncStatus').innerHTML = `
                        <p style="color: #ffa500;">⚠️ TeamUp API key or calendar ID not set</p>
                        <button onclick="showTeamUpSettingsPage()">⚙️ Set TeamUp Settings</button>
                    `;
                    return;
                }
                
                // Simple date range
                const today = new Date();
                const startDate = today.toISOString().split('T')[0];
                const endDate = new Date(today.getTime() + 30 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
                
                document.getElementById('syncStatus').innerHTML = '<p>🔄 Fetching data from TeamUp...</p>';
                
                // Fetch events
                const eventsResponse = await fetch(
                    `https://api.teamup.com/${calendarId}/events?startDate=${startDate}&endDate=${endDate}&limit=100`,
                    { headers: { 'Teamup-Token': apiKey } }
                );
                
                if (!eventsResponse.ok) throw new Error(`HTTP ${eventsResponse.status}`);
                
                const eventsData = await eventsResponse.json();
                
                // Fetch subcalendars
                const subcalendarsResponse = await fetch(
                    `https://api.teamup.com/${calendarId}/subcalendars`,
                    { headers: { 'Teamup-Token': apiKey } }
                );
                
                const subcalendarsData = await subcalendarsResponse.json();
                const installersMap = {};
                subcalendarsData.subcalendars.forEach(subcalendar => {
                    installersMap[subcalendar.id] = subcalendar.name;
                });
                
                // Process events
                let jobsCreated = 0, jobsUpdated = 0;
                
                for (const event of eventsData.events) {
                    if (event.subcalendar_ids && event.subcalendar_ids.length > 0) {
                        const installerId = event.subcalendar_ids[0];
                        const installerName = installersMap[installerId] || 'Unassigned';
                        
                        const job = {
                            title: event.title,
                            customer: event.who || 'Customer',
                            address: event.location || 'No address',
                            start_dt: event.start_dt,
                            end_dt: event.end_dt,
                            installer: installerName,
                            installerId: installerId,
                            status: 'not_started',
                            teamup_id: event.id
                        };
                        
                        // Check if job exists
                        const existingJob = await db.collection('jobs')
                            .where('teamup_id', '==', event.id)
                            .limit(1)
                            .get();
                        
                        if (existingJob.empty) {
                            await db.collection('jobs').add(job);
                            jobsCreated++;
                        } else {
                            await existingJob.docs[0].ref.update(job);
                            jobsUpdated++;
                        }
                    }
                }
                
                document.getElementById('syncStatus').innerHTML = `
                    <p style="color: #0f0;">✅ Sync Complete!</p>
                    <p>📅 Jobs created: ${jobsCreated}</p>
                    <p>🔄 Jobs updated: ${jobsUpdated}</p>
                    <p>👥 Installers found: ${subcalendarsData.subcalendars.length}</p>
                    <div style="margin-top: 20px;">
                        <button onclick="startTeamUpSync()">🔄 Sync Again</button>
                    </div>
                `;
                
            } catch (error) {
                console.error('Sync error:', error);
                document.getElementById('syncStatus').innerHTML = `
                    <p style="color: #f00;">❌ Sync Error: ${error.message}</p>
                    <div style="margin-top: 20px;">
                        <button onclick="startTeamUpSync()">🔄 Try Again</button>
                    </div>
                `;
            }
        }

                            await existingJob.docs[0].ref.update(job);
                            jobsUpdated++;
                        }
                    }
                }
                
                document.getElementById('syncStatus').innerHTML = `
                    <p style="color: #0f0;">✅ Sync Complete!</p>
                    <p>📅 Jobs created: ${jobsCreated}</p>
                    <p>🔄 Jobs updated: ${jobsUpdated}</p>
                    <p>👥 Installers found: ${subcalendarsData.subcalendars.length}</p>
                    <button onclick="showAdmin()">← Back to Admin</button>
                `;
                
            } catch (error) {
                console.error('Sync error:', error);
                document.getElementById('syncStatus').innerHTML = `
                    <p style="color: #f00;">❌ Sync Error: ${error.message}</p>
                    <button onclick="showAdmin()">← Back to Admin</button>
                `;
            }
        }

        async function viewPendingInstallers() {
            document.getElementById('adminContent').innerHTML = `<div class="box"><h3>⏳ Pending Installers</h3><div id="pendingList">Loading...</div></div>`;
            
            try {
                // Get jobs to find installers
                const jobsSnapshot = await db.collection('jobs').get();
                const installerMap = new Map();
                
                jobsSnapshot.docs.forEach(doc => {
                    const job = doc.data();
                    if (job.installer && job.installerId) {
                        if (!installerMap.has(job.installerId)) {
                            installerMap.set(job.installerId, {
                                id: job.installerId,
                                name: job.installer,
                                jobCount: 0,
                                jobs: []
                            });
                        }
                        const installer = installerMap.get(job.installerId);
                        installer.jobCount++;
                        installer.jobs.push(job.title);
                    }
                });
                
                // Get already provisioned installers
                const installersSnapshot = await db.collection('installers').get();
                const provisionedIds = new Set();
                
                installersSnapshot.docs.forEach(doc => {
                    const installer = doc.data();
                    if (installer.teamupId) {
                        provisionedIds.add(String(installer.teamupId));
                    }
                });
                
                // Find pending installers
                const pendingInstallers = Array.from(installerMap.values())
                    .filter(installer => !provisionedIds.has(String(installer.id)));
                
                let html = pendingInstallers.length === 0 
                    ? '<p>No pending installers found. All installers from jobs are provisioned.</p>'
                    : `<p>Found ${pendingInstallers.length} installers from jobs that need provisioning:</p>` + 
                      pendingInstallers.map(installer => `
                        <div class="job">
                            <strong>${installer.name}</strong><br>
                            ID: ${installer.id}<br>
                            Jobs: ${installer.jobCount}<br>
                            <button onclick="provisionPendingInstaller('${installer.id}', '${installer.name.replace(/'/g, "\\'")}', 'Found in ${installer.jobCount} jobs')" style="margin-top: 8px;">👤 Provision Installer</button>
                        </div>
                      `).join('');
                
                document.getElementById('pendingList').innerHTML = html;
            } catch (error) {
                document.getElementById('pendingList').innerHTML = '<p style="color: #f00;">Error loading pending installers</p>';
            }
        }

        function provisionPendingInstaller(installerId, installerName, source) {
            document.getElementById('content').innerHTML = `
                <div class="box">
                    <div style="margin-bottom: 15px;">

                    <h3>👤 Provision Installer: ${installerName}</h3>

                    <p><strong>TeamUp ID:</strong> ${installerId}</p>
                    
                    <div style="margin-top: 20px;">
                        <input type="text" id="installerName" placeholder="Installer Name" value="${installerName}">
                        <input type="email" id="installerEmail" placeholder="Email Address">
                        <input type="tel" id="installerPhone" placeholder="Phone Number">
                    </div>
                    
                    <div style="margin-top: 20px;">

            `;
        }

        async function completeProvisioning(installerId) {
            const name = document.getElementById('installerName').value.trim();
            const email = document.getElementById('installerEmail').value.trim();
            const phone = document.getElementById('installerPhone').value.trim();
            
            if (!name || !email || !phone) {
                alert('Please fill in all fields');
                return;
            }
            
            try {
                // Check if installer already exists
                const existingSnapshot = await db.collection('installers')
                    .where('teamupId', '==', installerId)
                    .get();
                
                // Generate unique token
                const token = generateInstallerToken();
                
                const installer = {
                    name: name,
                    email: email,
                    phone: phone,
                    teamupId: installerId,
                    status: 'active',
                    source: 'teamup',
                    provisionedBy: 'admin',
                    token: token,
                    createdAt: new Date().toISOString()
                };
                
                if (existingSnapshot.empty) {
                    // Create new installer
                    await db.collection('installers').add(installer);
                    console.log('Created new installer:', installerId);
                } else {
                    // Update existing installer
                    await existingSnapshot.docs[0].ref.update(installer);
                    console.log('Updated existing installer:', installerId);
                }
                
                // Show success with token
                document.getElementById('content').innerHTML = `
                    <div class="box">
                        <h3>✅ Installer Provisioned!</h3>
                        <p><strong>Name:</strong> ${name}</p>
                        <p><strong>Email:</strong> ${email}</p>
                        <p><strong>TeamUp ID:</strong> ${installerId}</p>
                        <p><strong>Action:</strong> ${existingSnapshot.empty ? 'Created new record' : 'Updated existing record'}</p>
                        <div style="background: rgba(0,255,0,0.1); padding: 15px; border: 1px solid #0f0; margin: 15px 0;">
                            <h4>🔧 Installer Portal Access:</h4>
                            <p><strong>Token:</strong> <code style="background: #000; padding: 2px 4px;">${token}</code></p>
                            <p><strong>Portal URL:</strong> <code style="background: #000; padding: 2px 4px;">${window.location.origin}?token=${token}</code></p>
                            <button onclick="window.open('${window.location.origin}?token=${token}', '_blank')" style="background: #0f0; color: #000; margin-top: 10px;">🔧 Test Installer Portal</button>
                        </div>
                        <div style="margin-top: 20px;">
                            <button onclick="showInstallersPage()">⏳ View More Pending</button>
                            <button onclick="showInstallersPage()">👥 View All Installers</button>
                        </div>
                    </div>
                `;
                
            } catch (error) {
                console.error('Error provisioning installer:', error);
                alert('Error provisioning installer: ' + error.message);
            }
        }

        function generateInstallerToken() {
            // Generate a unique token
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let token = '';
            for (let i = 0; i < 8; i++) {
                token += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return token;
        }

        async function generateTokenForInstaller(installerId, installerName) {
            if (!confirm(`Generate token for ${installerName}?`)) {
                return;
            }
            
            try {
                const token = generateInstallerToken();
                
                await db.collection('installers').doc(installerId).update({
                    token: token,
                    token_generated_at: new Date().toISOString()
                });
                
                // Show success with token and portal link
                document.getElementById('content').innerHTML = `
                    <div class="box">
                        <h3>🔑 Token Generated for ${installerName}</h3>

                console.error('Error generating token:', error);

            }
        }

        function saveTeamUpSettings() {
            const apiKey = document.getElementById('teamupApiKey').value.trim();
            const calendarId = document.getElementById('teamupCalendarId').value.trim();
            
            if (!apiKey || !calendarId) {
                alert('Please fill in both API key and calendar ID');
                return;

            localStorage.setItem('teamupApiKey', apiKey);
            localStorage.setItem('teamupCalendarId', calendarId);

        // Initialize
        window.onload = function() {
            console.log('🔥 Installer Portal v4.1.0-CLEAN loaded');
            
            // Check for installer token in URL first
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            
            if (token) {
                console.log('🔑 Found installer token:', token);
                authenticateInstallerWithToken(token);
                return;
            }
            
            // Check URL and route for admin pages
            const path = window.location.pathname;
            if (path.includes('/admin/installers')) {
                showInstallersPage();
            } else if (path.includes('/admin/data')) {
                showDataPage();
            } else if (path.includes('/admin')) {
                showAdmin();
            } else {
                showHome();
            }
        };

        // Token-based installer authentication
        async function authenticateInstallerWithToken(token) {
            try {
                // Find installer by token
                const installerSnapshot = await db.collection('installers')
                    .where('token', '==', token)
                    .get();
                
                if (installerSnapshot.empty) {
                    console.error('❌ Invalid token');
                    document.getElementById('content').innerHTML = `
                        <div class="box">
                            <h2>❌ Invalid Token</h2>
                            <p>The provided token is not valid.</p>
                            <button onclick="showHome()">🏠 Back to Home</button>
                        </div>
                    `;
                    return;
                }
                
                const installer = installerSnapshot.docs[0].data();
                console.log('✅ Token authenticated for:', installer.name);
                showInstallerPortal(installer);
                
            } catch (error) {
                console.error('❌ Authentication error:', error);
                document.getElementById('content').innerHTML = `
                    <div class="box">
                        <h2>❌ Authentication Error</h2>
                        <p>Failed to authenticate. Please try again.</p>
                        <button onclick="showHome()">🏠 Back to Home</button>
                    </div>
                `;
            }
        }
