<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Armor Vue — Dashboard</title>

  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
  <link rel="stylesheet" href="css/styles.css">

  <style>
    .tab-bar {
      display: flex; gap: .4rem;
      border-bottom: 1px solid var(--hairline);
      margin-bottom: 1.5rem;
    }
    .tab-btn {
      padding: .55rem 1rem; background: none; border: none;
      border-bottom: 2px solid transparent; color: var(--muted);
      font-size: .875rem; font-weight: 500; cursor: pointer;
      margin-bottom: -1px; transition: all .15s;
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    .view-toggle {
      display: flex; gap: .4rem; margin-bottom: 1.25rem;
    }
    .view-btn {
      padding: .4rem .9rem; border: 1px solid var(--hairline);
      border-radius: 6px; background: none; color: var(--muted);
      font-size: .8rem; cursor: pointer; transition: all .15s;
    }
    .view-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }

    .date-filter {
      display: flex; align-items: center; gap: .6rem;
      margin-bottom: 1.25rem; font-size: .85rem;
    }
    .date-filter label { color: var(--muted); white-space: nowrap; }
    .date-filter input { padding: .35rem .6rem; border: 1px solid var(--hairline); border-radius: 6px; background: var(--surface); color: var(--text); font-size: .8rem; }

    /* Report cards */
    .report-card {
      background: var(--surface);
      border: 1px solid var(--hairline);
      border-radius: var(--r-card);
      padding: 1rem;
      margin-bottom: .65rem;
    }
    .report-card.archived { opacity: .5; }
    .rc-header { display: flex; align-items: flex-start; justify-content: space-between; gap: .75rem; margin-bottom: .5rem; }
    .rc-name   { font-weight: 600; font-size: .95rem; }
    .rc-job    { font-size: .75rem; color: var(--muted); margin-top: .1rem; }
    .rc-body   { font-size: .82rem; color: var(--muted); margin-bottom: .5rem; }
    .rc-body strong { color: var(--text); }
    .rc-status {
      display: inline-block; padding: .15rem .5rem;
      border-radius: 4px; font-size: .7rem; font-weight: 600;
      border: 1px solid currentColor; margin-bottom: .5rem;
    }
    .rc-sig-row { display: flex; gap: .75rem; font-size: .78rem; margin-bottom: .5rem; }
    .sig-badge  { display: flex; align-items: center; gap: .3rem; }
    .sig-ok   { color: var(--ok); }
    .sig-miss { color: var(--warn); }

    .rc-defects { margin: .4rem 0 .5rem; }
    .defect-item {
      background: var(--surface-2); border-radius: 6px;
      margin-bottom: .4rem; border-left: 3px solid var(--bad);
      overflow: hidden;
    }
    .defect-item > summary {
      list-style: none; cursor: pointer;
      padding: .4rem .65rem; display: flex; align-items: center;
      gap: .5rem; font-size: .78rem;
      user-select: none;
    }
    .defect-item > summary::-webkit-details-marker { display: none; }
    .defect-item > summary::before {
      content: '▶'; font-size: .6rem; color: var(--muted);
      transition: transform .15s; flex-shrink: 0;
    }
    .defect-item[open] > summary::before { transform: rotate(90deg); }
    .defect-detail {
      padding: .5rem .65rem .6rem; border-top: 1px solid var(--hairline);
      font-size: .78rem; display: flex; flex-direction: column; gap: .35rem;
    }
    .defect-type { font-weight: 600; color: var(--bad); }
    .defect-photos { display: flex; gap: .4rem; flex-wrap: wrap; margin-top: .25rem; }
    .defect-photo { width: 72px; height: 72px; object-fit: cover; border-radius: 4px; border: 1px solid var(--hairline); cursor: pointer; }

    .rc-actions { display: flex; gap: .5rem; align-items: center; flex-wrap: wrap; margin-top: .65rem; }
    .archive-note { flex: 1; }
    .archive-note input {
      width: 100%; padding: .35rem .6rem;
      border: 1px solid var(--hairline); border-radius: 6px;
      background: var(--surface-2); color: var(--text); font-size: .78rem;
    }

    .section-label {
      font-size: .72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .07em;
      color: var(--muted); padding: .6rem 0 .4rem;
    }
    .empty-state { color: var(--muted); font-size: .875rem; padding: 1.5rem 0; text-align: center; }

    .stat-mini {
      padding: .5rem 1rem; min-width: 5rem; text-align: center;
      background: var(--surface); border: 1px solid var(--hairline); border-radius: 8px;
    }
    .stat-mini.ok   { border-color: var(--ok); }
    .stat-mini.bad  { border-color: var(--bad); }
    .stat-mini.warn { border-color: var(--warn); }
    .stat-mini-val  { font-size: 1.5rem; font-weight: 700; line-height: 1; }
    .stat-mini.ok   .stat-mini-val  { color: var(--ok); }
    .stat-mini.bad  .stat-mini-val  { color: var(--bad); }
    .stat-mini.warn .stat-mini-val  { color: var(--warn); }
    .stat-mini-lbl  { font-size: .65rem; font-weight: 700; text-transform: uppercase;
                       letter-spacing: .06em; color: var(--muted); margin-top: .2rem; }

    /* Running totals bar */
    .running-totals {
      background: var(--surface); border: 1px solid var(--hairline);
      border-radius: var(--r-card); padding: 1rem 1.25rem;
      margin-bottom: 1.25rem;
    }
    .totals-row {
      display: flex; gap: 1.75rem; flex-wrap: wrap; margin-bottom: .6rem;
    }
    .total-cell { text-align: center; }
    .total-cell-val { font-size: 1.4rem; font-weight: 700; line-height: 1; }
    .total-cell-lbl { font-size: .65rem; font-weight: 700; text-transform: uppercase;
                      letter-spacing: .06em; color: var(--muted); margin-top: .2rem; }
    .goal-bar-track { background: var(--surface-2); border-radius: 4px; height: 8px; overflow: hidden; }
    .goal-bar-fill  { height: 100%; border-radius: 4px; transition: width .3s; }

    /* Defect action cards */
    .defect-action-card {
      background: var(--surface); border: 1px solid var(--hairline);
      border-left: 4px solid var(--bad);
      border-radius: var(--r-card); padding: 1rem;
      margin-bottom: .65rem;
    }
    .defect-action-card.tracked { border-left-color: var(--accent); }
    .defect-actions { display: flex; gap: .5rem; flex-wrap: wrap; align-items: flex-start; margin-top: .65rem; }
    .track-note-wrap { display: flex; gap: .3rem; align-items: center; }
    .track-note-input {
      padding: .3rem .5rem; border: 1px solid var(--hairline); border-radius: 4px;
      background: var(--surface-2); color: var(--text); font-size: .78rem; width: 180px;
    }

    /* Material cards */
    .material-note-input {
      flex: 1; padding: .3rem .5rem; border: 1px solid var(--hairline);
      border-radius: 4px; background: var(--surface-2); color: var(--text); font-size: .78rem;
    }

    .reminder-modal-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,.55);
      display: flex; align-items: center; justify-content: center; padding: 1rem;
    }
    .reminder-modal {
      background: var(--surface); border: 1px solid var(--hairline);
      border-radius: var(--r-card); padding: 1.5rem;
      width: 100%; max-width: 420px;
    }

    /* ── COC/Walkthrough viewer modal ── */
    #coc-modal-overlay {
      position: fixed; inset: 0; z-index: 2000;
      background: rgba(0,0,0,.75);
      display: none; align-items: flex-start; justify-content: center;
      overflow-y: auto; padding: 1.5rem 1rem;
    }
    #coc-modal-overlay.open { display: flex; }
    .coc-modal {
      background: var(--surface); border: 1px solid var(--hairline);
      border-radius: var(--r-card); width: 100%; max-width: 680px;
      overflow: hidden; box-shadow: var(--shadow-lg);
    }
    .coc-modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: .9rem 1.25rem; border-bottom: 1px solid var(--hairline);
      background: var(--surface-2); gap: 1rem;
    }
    .coc-modal-header h3 { font-size: 1rem; font-weight: 600; margin: 0; }
    .coc-modal-header .coc-job-ref { font-size: .78rem; color: var(--muted); }
    .coc-modal-header .coc-actions { display: flex; gap: .5rem; }
    .coc-section { padding: 1.25rem; border-bottom: 1px solid var(--hairline); }
    .coc-section:last-child { border-bottom: none; }
    .coc-section-title {
      font-size: .7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .07em; color: var(--muted); margin-bottom: 1rem;
      display: flex; align-items: center; gap: .5rem;
    }
    .coc-section-title::after { content:''; flex:1; height:1px; background:var(--hairline); }
    .coc-checklist { list-style: none; }
    .coc-checklist li {
      display: flex; align-items: flex-start; gap: .6rem;
      padding: .35rem 0; border-bottom: 1px solid var(--hairline);
      font-size: .83rem;
    }
    .coc-checklist li:last-child { border-bottom: none; }
    .coc-check {
      width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0;
      margin-top: 2px; font-size: .6rem;
      display: flex; align-items: center; justify-content: center; font-weight: 700;
    }
    .coc-check.done { background: var(--ok); color: #000; }
    .coc-check.skip { background: var(--hairline); color: var(--muted); }
    .coc-check-time { margin-left: auto; font-size: .7rem; color: var(--muted); white-space: nowrap; padding-left: .5rem; }
    .coc-sig-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }
    .coc-sig-party { font-size: .7rem; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: .4rem; }
    .coc-sig-img {
      border: 1px solid var(--hairline); border-radius: 8px;
      background: #fff; height: 90px;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .coc-sig-img img { max-height: 80px; max-width: 100%; object-fit: contain; }
    .coc-sig-no { font-size: .75rem; color: var(--muted); font-style: italic; }
    .coc-sig-meta { margin-top: .4rem; font-size: .72rem; color: var(--muted); }
    .coc-sig-meta strong { color: var(--text); }
    .coc-agreement {
      font-size: .83rem; line-height: 1.7; color: var(--muted);
      background: var(--surface-2); border: 1px solid var(--hairline);
      border-radius: 8px; padding: .9rem 1rem; white-space: pre-wrap; margin-bottom: 1rem;
    }
    .coc-rating-row { display: flex; gap: 1.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .coc-rating-item { font-size: .82rem; }
    .coc-rating-label { color: var(--muted); margin-bottom: .2rem; }
    .coc-stars { color: var(--warn); font-size: 1rem; letter-spacing: 1px; }
    .coc-incomplete { display: inline-block; background: rgba(245,158,11,.15); color: var(--warn);
      border: 1px solid var(--warn); border-radius: 4px; padding: 1px 7px;
      font-size: .7rem; font-weight: 600; margin-left: .5rem; vertical-align: middle; }
    .coc-note { margin-top: .75rem; font-size: .82rem; color: var(--text);
      background: rgba(245,158,11,.08); border-left: 3px solid var(--warn);
      padding: .5rem .75rem; border-radius: 0 4px 4px 0; }

    @media print {
      body > *:not(#coc-modal-overlay) { display: none !important; }
      #coc-modal-overlay { display: block !important; position: static !important;
        background: none !important; padding: 0 !important; overflow: visible !important; }
      .coc-modal { box-shadow: none !important; border: none !important;
        border-radius: 0 !important; max-width: 100% !important; }
      .coc-modal-header .coc-actions { display: none !important; }
      .coc-sig-img { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .coc-section { break-inside: avoid; page-break-inside: avoid; }
      .coc-section:not(:last-child) { break-after: page; page-break-after: always; }
    }
  </style>
</head>
<body>

<div id="coc-modal-overlay">
  <div class="coc-modal">
    <div class="coc-modal-header">
      <div>
        <h3>COC &amp; Walkthrough</h3>
        <div class="coc-job-ref" id="coc-job-ref"></div>
      </div>
      <div class="coc-actions">
        <button class="btn btn-secondary btn-sm" onclick="window.print()">🖨 Print / PDF</button>
        <button class="btn btn-ghost btn-sm" onclick="closeCocModal()">✕ Close</button>
      </div>
    </div>
    <div id="coc-modal-body"><p style="padding:2rem;text-align:center;color:var(--muted)">Loading…</p></div>
  </div>
</div>

<div id="app"></div>
<div id="flash" class="hidden" style="position:fixed;top:1rem;right:1rem;z-index:9999;min-width:280px;max-width:420px;"></div>

<script src="js/firebase-config.js"></script>

<script>
// ============================================================
// ARMOR VUE — DASHBOARD PORTAL
// ============================================================

function flash(type, msg, ms = 4000) {
    const el = document.getElementById('flash');
    el.className = 'alert alert-' + type;
    el.textContent = msg;
    clearTimeout(window._ft);
    window._ft = setTimeout(() => el.classList.add('hidden'), ms);
}

let currentUser    = null;
let currentRole    = null;
let _statusOptions = [];
let _financeStats  = [];
let _serviceStats  = [];
let _monthlyGoal   = 0;
let _laborWarnPct  = 28;
let _laborHighPct  = 35;
let activeTab      = null;
let activeView     = 'dashboard'; // 'dashboard' | 'archive'
let archiveFrom    = '';
let archiveTo      = '';

// ── Auth ──────────────────────────────────────────────────────
auth.onAuthStateChanged(async user => {
    if (!user) { showLogin(); return; }
    try {
        const snap = await db.collection('management_users').doc(user.uid).get();
        if (!snap.exists || snap.data().status !== 'active') {
            showLogin('Your account does not have dashboard access.'); return;
        }
        currentUser = { uid: user.uid, email: user.email, ...snap.data() };
        currentRole = currentUser.role;
        await loadStatusConfig();
        showPortal();
    } catch(err) { showLogin('Could not verify your account. Please try again.'); }
});

async function loadStatusConfig() {
    try {
        const snap = await db.collection('settings').doc('portal').get();
        if (snap.exists) {
            const d = snap.data();
            if (Array.isArray(d.statuses)) _statusOptions = d.statuses;
            if (d.monthlyGoal  != null) _monthlyGoal  = parseFloat(d.monthlyGoal)  || 0;
            if (d.laborWarnPct != null) _laborWarnPct = parseFloat(d.laborWarnPct) || 28;
            if (d.laborHighPct != null) _laborHighPct = parseFloat(d.laborHighPct) || 35;
        }
    } catch(e) {}
    _financeStats = _statusOptions.length
        ? _statusOptions.filter(s => s.showInFinance).map(s => s.val)
        : ['completed_collected','completed_not_collected','completed_partial'];
    _serviceStats = _statusOptions.length
        ? _statusOptions.filter(s => s.showInService).map(s => s.val)
        : ['complete_need_service'];
}

function statusLabel(val) {
    const s = _statusOptions.find(s => s.val === val);
    return s ? s.label : val;
}
function statusColor(val) {
    const s = _statusOptions.find(s => s.val === val);
    return s ? s.color : '#94A3B8';
}
function isCollectedStatus(val) {
    const s = _statusOptions.find(s => s.val === val);
    if (s && 'collected' in s) return s.collected;
    return val === 'completed_collected';
}

// ── Login ─────────────────────────────────────────────────────
function showLogin(errorMsg) {
    document.getElementById('app').innerHTML = `
        <div class="login-page">
            <div class="login-card">
                <div class="login-logo">
                    <div class="brand">Armor Vue</div>
                    <div class="sub">Dashboard</div>
                </div>
                ${errorMsg ? `<div class="alert alert-error mb-4">${errorMsg}</div>` : ''}
                <div id="login-error" class="hidden alert alert-error mb-4"></div>
                <form id="login-form" autocomplete="off">
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input class="form-input" type="email" id="email" required placeholder="your@email.com">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input class="form-input" type="password" id="password" required placeholder="••••••••">
                    </div>
                    <button class="btn btn-primary w-full btn-lg mt-2" type="submit" id="login-btn">Sign In</button>
                    <div class="text-center mt-3">
                        <button type="button" class="btn btn-ghost btn-sm" onclick="sendReset()">Forgot password?</button>
                    </div>
                </form>
            </div>
        </div>`;
    document.getElementById('login-form').addEventListener('submit', e => {
        e.preventDefault();
        const btn = document.getElementById('login-btn');
        const err = document.getElementById('login-error');
        btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Signing in…'; err.classList.add('hidden');
        auth.signInWithEmailAndPassword(
            document.getElementById('email').value.trim(),
            document.getElementById('password').value
        ).catch(e2 => {
            err.textContent = 'Invalid email or password.';
            err.classList.remove('hidden');
            btn.disabled = false; btn.textContent = 'Sign In';
        });
    });
}

async function sendReset() {
    const email = (document.getElementById('email')?.value || '').trim();
    const err   = document.getElementById('login-error');
    if (!email) { err.textContent = 'Enter your email above first.'; err.classList.remove('hidden'); return; }
    try {
        await auth.sendPasswordResetEmail(email);
        err.className = 'alert alert-info mb-4';
        err.textContent = `Password reset email sent to ${email}.`;
        err.classList.remove('hidden');
    } catch(e) { err.textContent = 'Could not send reset: ' + e.message; err.className = 'alert alert-error mb-4'; err.classList.remove('hidden'); }
}

// ── Portal shell ──────────────────────────────────────────────
function showPortal() {
    const roleLabel = { manager: 'Manager', finance: 'Finance', service: 'Service' }[currentRole] || currentRole;
    const tabs = [];
    if (currentRole === 'manager') tabs.push({ id: 'daily', label: '📋 Daily Review' });
    if (currentRole === 'finance' || currentRole === 'manager') tabs.push({ id: 'finance',   label: '💰 Finance' });
    if (currentRole === 'finance' || currentRole === 'manager') tabs.push({ id: 'analytics', label: '📊 Analytics' });
    if (currentRole === 'service' || currentRole === 'manager') tabs.push({ id: 'service',   label: '🔧 Service' });
    if (currentRole === 'service' || currentRole === 'manager') tabs.push({ id: 'materials', label: '📦 Materials' });

    document.getElementById('app').innerHTML = `
        <nav class="admin-nav">
            <div class="admin-nav-brand"><span>AV</span> Dashboard</div>
            <div style="font-size:.8rem;color:var(--muted)">${esc(currentUser.displayName || currentUser.email)} · ${roleLabel}</div>
            <div class="admin-nav-actions">
                <button class="btn btn-ghost btn-sm" onclick="auth.signOut()">Logout</button>
            </div>
        </nav>
        <main class="admin-content">
            <div class="tab-bar">
                ${tabs.map(t => `<button class="tab-btn" id="tab-${t.id}" onclick="switchTab('${t.id}')">${t.label}</button>`).join('')}
            </div>
            <div id="report-content"></div>
        </main>`;

    activeTab = tabs[0]?.id;
    switchTab(activeTab);
}

function switchTab(tab) {
    activeTab  = tab;
    activeView = 'dashboard';
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === 'tab-' + tab));
    if (tab === 'daily')     loadDailyReview();
    if (tab === 'finance')   loadFinanceReport();
    if (tab === 'analytics') loadAnalyticsReport();
    if (tab === 'service')   loadServiceReport();
    if (tab === 'materials') loadMaterialsTab();
}

// ── DAILY REVIEW ──────────────────────────────────────────────
let _reviewDate = '';

function yesterdayStr() {
    const d = new Date();
    d.setDate(d.getDate() - 1);
    return d.toISOString().slice(0, 10);
}

function reviewDateLabel(iso) {
    const d    = new Date(iso + 'T12:00:00');
    const yest = yesterdayStr();
    const tod  = new Date().toISOString().slice(0, 10);
    if (iso === yest) return 'Yesterday · ' + d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
    if (iso === tod)  return 'Today · '     + d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
    return d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
}

function dailyControlsHtml() {
    const v = _reviewDate || yesterdayStr();
    return `
    <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap">
        <div style="font-size:.95rem;font-weight:600;flex:1">${reviewDateLabel(v)}</div>
        <input type="date" id="review-date" value="${v}"
            style="padding:.4rem .75rem;border:1px solid var(--hairline);border-radius:6px;
                   background:var(--surface);color:var(--text);font-size:.85rem"
            onchange="_reviewDate=this.value;loadDailyReview()">
    </div>`;
}

// Determine flags for a job record
function getFlags(rec, job) {
    const flags     = [];
    const statusOpt = _statusOptions.find(s => s.val === rec.status);
    const isComplete   = !!statusOpt?.countsAsComplete;
    const requiresSig  = !!statusOpt?.requiresSignatures;

    const wt  = rec.signatures?.walkthrough || {};
    const coc = rec.signatures?.completion  || {};
    const wtSigned  = !!(wt.customerAt && wt.installerAt);
    const cocSigned = !!(coc.customerAt && coc.installerAt);

    if (rec.status && rec.status !== 'not_started' && !isComplete) {
        const sev = rec.status === 'in_progress' ? 1 : 2;
        flags.push({ type: 'outcome', label: statusLabel(rec.status), sev });
    }

    if (requiresSig && !wtSigned)  flags.push({ type: 'sig', label: 'Missing Walkthrough Sig', sev: 1 });
    if (requiresSig && !cocSigned) flags.push({ type: 'sig', label: 'Missing COC Sig', sev: 1 });

    const defectCount = (rec.openings || []).reduce((n, o) => n + (o.defects || []).filter(d => !d.clearedAt).length, 0);
    if (defectCount > 0) flags.push({ type: 'defect', label: `${defectCount} Defect${defectCount > 1 ? 's' : ''}`, sev: 2 });

    const balDue = rec.financials?.balanceDue || job?.financials?.balanceDue || '';
    if (isComplete && !balDue) flags.push({ type: 'payment', label: 'No Payment Info', sev: 1 });

    if (rec.walkthroughIncomplete) flags.push({ type: 'wt', label: 'Incomplete Walkthrough', sev: 1 });

    const invIssues = rec.inventoryIssues || [];
    if (invIssues.length > 0) {
        const label = invIssues.length === 1
            ? `Inventory Issue: ${invIssues[0].type}`
            : `${invIssues.length} Inventory Issues`;
        flags.push({ type: 'inventory', label, sev: 2 });
    }

    return flags;
}

function morningCard(item) {
    const { job, rec, flags, assignedNames } = item;
    const noRec   = !rec;
    const hasBad  = flags.some(f => f.sev >= 2);
    const hasWarn = !hasBad && flags.length > 0;
    const isClean = flags.length === 0 && !noRec;

    const borderColor = noRec ? 'var(--warn)' : hasBad ? 'var(--bad)' : hasWarn ? 'var(--warn)' : 'var(--ok)';
    const statusOpt   = rec ? _statusOptions.find(s => s.val === rec.status) : null;
    const statusCol   = statusOpt?.color || '#94A3B8';

    const fin = job.financials || rec?.financials || {};
    const startDt = job.startDt ? (job.startDt.toDate ? job.startDt.toDate() : new Date(job.startDt)) : null;
    const timeStr = startDt ? startDt.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' }) : '';

    const wt  = rec?.signatures?.walkthrough || {};
    const coc = rec?.signatures?.completion  || {};
    const wtSigned  = !!(wt.customerAt && wt.installerAt);
    const cocSigned = !!(coc.customerAt && coc.installerAt);

    const flagPills = flags.map(f => {
        const bg  = f.sev >= 2 ? 'rgba(239,68,68,.13)' : 'rgba(234,179,8,.13)';
        const col = f.sev >= 2 ? 'var(--bad)' : 'var(--warn)';
        return `<span style="font-size:.72rem;font-weight:600;padding:.18rem .45rem;border-radius:4px;background:${bg};color:${col}">${esc(f.label)}</span>`;
    }).join('');

    return `
    <div style="background:var(--surface);border:1px solid var(--hairline);
                border-left:4px solid ${borderColor};border-radius:var(--r-card);
                padding:.85rem 1rem;margin-bottom:.45rem">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem">
            <div style="min-width:0;flex:1">
                <div style="font-weight:700;font-size:.95rem">${esc(job.customerName || '—')}</div>
                <div style="font-size:.75rem;color:var(--muted);margin-top:.1rem">
                    Job #${esc(job.jobNumber || job.id)}${timeStr ? ' · ' + timeStr : ''}${job.address ? ' · ' + esc(job.address.split('\n')[0]) : ''}
                </div>
            </div>
            <div style="flex-shrink:0;text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:.3rem">
                ${rec
                    ? `<div style="font-size:.75rem;font-weight:600;color:${statusCol}">${esc(statusLabel(rec.status))}</div>`
                    : `<div style="font-size:.75rem;font-weight:600;color:var(--warn)">No Activity</div>`}
                <div style="font-size:.72rem;color:var(--muted)">${esc(assignedNames)}</div>
                ${rec ? `<button class="btn btn-sm btn-secondary" style="font-size:.72rem;padding:.2rem .5rem" onclick="printJob('${rec.id}')" title="View COC &amp; Walkthrough">📄 View COC/Walkthrough</button>` : ''}
            </div>
        </div>

        ${rec ? `
        <div style="display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.55rem;align-items:center">
            ${fin.balanceDue ? `<span style="font-size:.75rem;padding:.15rem .5rem;background:var(--surface-2);border-radius:4px">💵 $${esc(String(fin.balanceDue))}${fin.paymentMethod ? ' · ' + esc(fin.paymentMethod) : ''}</span>` : ''}
            <span style="font-size:.72rem;padding:.15rem .4rem;border-radius:4px;background:var(--surface-2);color:${wtSigned ? 'var(--ok)' : 'var(--warn)'}">${wtSigned ? '✓' : '⚠'} Walkthrough</span>
            <span style="font-size:.72rem;padding:.15rem .4rem;border-radius:4px;background:var(--surface-2);color:${cocSigned ? 'var(--ok)' : 'var(--warn)'}">${cocSigned ? '✓' : '⚠'} COC</span>
            ${job.windowCount != null ? `<span style="font-size:.72rem;padding:.15rem .4rem;border-radius:4px;background:var(--surface-2);color:var(--muted)">${job.windowCount}W${job.doorCount != null ? ' / ' + job.doorCount + 'D' : ''}</span>` : ''}
        </div>` : ''}

        ${flags.length > 0 ? `<div style="display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.5rem">${flagPills}</div>` : ''}
        ${isClean ? `<div style="margin-top:.4rem;font-size:.72rem;color:var(--ok)">✓ All clear</div>` : ''}
        ${rec?.statusNote ? `<div style="margin-top:.4rem;font-size:.78rem;color:var(--muted)"><strong style="color:var(--text)">Note:</strong> ${esc(rec.statusNote)}</div>` : ''}
        ${(() => {

            );

            return `<div class="rc-defects" style="margin-top:.6rem">${defects.map(d => {

            }).join('')}</div>`;
        })()}

}

async function loadDailyReview() {
    const content   = document.getElementById('report-content');
    _reviewDate     = _reviewDate || yesterdayStr();
    content.innerHTML = dailyControlsHtml() + '<div class="text-center p-6"><span class="spinner"></span> Loading jobs…</div>';

    try {
        const start = new Date(_reviewDate + 'T00:00:00');
        const end   = new Date(_reviewDate + 'T23:59:59');

        const [jobSnap, matSnap, fiSnap] = await Promise.all([
            db.collection('jobs').where('startDt', '>=', start).where('startDt', '<=', end).get()
                .catch(e => { throw new Error('jobs: ' + e.message); }),
            db.collection('material_orders').where('status', '==', 'pending').get()
                .catch(e => { throw new Error('material_orders: ' + e.message); }),
            db.collection('failed_inspections').where('status', '==', 'open').get()
                .catch(e => { throw new Error('failed_inspections: ' + e.message); }),
        ]);

        const pendingMaterials  = matSnap.size;
        const openInspections   = fiSnap.size;
        const jobs = jobSnap.docs.map(d => ({ id: d.id, ...d.data() })).filter(j => !j.isServiceCall);
        jobs.sort((a, b) => {
            const at = a.startDt?.seconds || (a.startDt?.toDate?.().getTime() / 1000) || 0;
            const bt = b.startDt?.seconds || (b.startDt?.toDate?.().getTime() / 1000) || 0;
            return at - bt;
        });

        if (jobs.length === 0) {
            content.innerHTML = dailyControlsHtml() + '<div class="empty-state">No jobs scheduled on this date.</div>';
            return;
        }

        // Fetch job_records for these jobs (batch by 10)
        const jobIds = jobs.map(j => j.id);
        const recMap = {};
        for (let i = 0; i < jobIds.length; i += 10) {
            const snap = await db.collection('job_records')
                .where('jobId', 'in', jobIds.slice(i, i + 10)).get();
            snap.docs.forEach(d => {
                const r = { id: d.id, ...d.data() };
                if (!recMap[r.jobId]) recMap[r.jobId] = [];
                recMap[r.jobId].push(r);
            });
        }

        // Fetch installer display names
        const instIds = [...new Set(
            Object.values(recMap).flat().map(r => r.installerId).filter(Boolean)
        )];
        const instMap = {};
        for (let i = 0; i < instIds.length; i += 10) {
            const snap = await db.collection('installers')
                .where(firebase.firestore.FieldPath.documentId(), 'in', instIds.slice(i, i + 10)).get();
            snap.docs.forEach(d => { instMap[d.id] = d.data(); });
        }

        const items = jobs.map(job => {
            const records = recMap[job.id] || [];
            const rec     = records[0] || null;
            const assignedNames = records.length > 0
                ? records.map(r => instMap[r.installerId]?.displayName || r.installerId || '—').join(', ')
                : '—';
            const flags = rec ? getFlags(rec, job) : [];
            return { job, rec, records, assignedNames, flags };
        });

        items.sort((a, b) => {
            const sevA = a.flags.some(f => f.sev >= 2) ? 2 : a.flags.length > 0 ? 1 : a.rec ? 0 : -1;
            const sevB = b.flags.some(f => f.sev >= 2) ? 2 : b.flags.length > 0 ? 1 : b.rec ? 0 : -1;
            if (sevB !== sevA) return sevB - sevA;
            return (a.job.startDt?.seconds || 0) - (b.job.startDt?.seconds || 0);
        });

        const active   = items.filter(i => i.rec);
        const inactive = items.filter(i => !i.rec);

        const total    = items.length;
        const allClear = active.filter(i => i.flags.length === 0).length;
        const needAttn = active.filter(i => i.flags.some(f => f.sev >= 2)).length;
        const warnings = active.filter(i => i.flags.length > 0 && !i.flags.some(f => f.sev >= 2)).length;

        // Finance + service snapshots (manager only)
        const financeItems    = active.filter(i => i.rec && _financeStats.includes(i.rec.status));
        const collectedToday  = financeItems.filter(i => i.rec.status !== 'completed_not_collected');
        const notCollToday    = financeItems.filter(i => i.rec.status === 'completed_not_collected');
        const totalCollected  = collectedToday.reduce((sum, i) => {
            const r = i.rec;
            if (r.amountCollected != null) return sum + (parseFloat(r.amountCollected) || 0);
            if (r.status === 'completed_collected') return sum + (parseFloat(r.financials?.balanceDue) || 0);
            return sum;
        }, 0);
        const totalDefects = active.reduce((n, i) =>
            n + (i.rec?.openings || []).reduce((m, o) =>
                m + (o.defects || []).filter(d => !d.clearedAt).length, 0), 0);

        const summaryHtml = `
        <div style="display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:1.5rem">
            <div class="stat-mini"><div class="stat-mini-val">${total}</div><div class="stat-mini-lbl">JOBS</div></div>
            ${allClear > 0 ? `<div class="stat-mini ok"><div class="stat-mini-val">${allClear}</div><div class="stat-mini-lbl">ALL CLEAR</div></div>` : ''}
            ${needAttn > 0 ? `<div class="stat-mini bad"><div class="stat-mini-val">${needAttn}</div><div class="stat-mini-lbl">NEEDS ATTENTION</div></div>` : ''}
            ${warnings  > 0 ? `<div class="stat-mini warn"><div class="stat-mini-val">${warnings}</div><div class="stat-mini-lbl">WARNINGS</div></div>` : ''}
            ${inactive.length > 0 ? `<div class="stat-mini"><div class="stat-mini-val">${inactive.length}</div><div class="stat-mini-lbl">NO ACTIVITY</div></div>` : ''}
            ${currentRole === 'manager' && collectedToday.length > 0 ? `<div class="stat-mini ok"><div class="stat-mini-val">${collectedToday.length}</div><div class="stat-mini-lbl">COLLECTED</div></div>` : ''}
            ${currentRole === 'manager' && notCollToday.length > 0 ? `<div class="stat-mini warn"><div class="stat-mini-val">${notCollToday.length}</div><div class="stat-mini-lbl">NOT COLLECTED</div></div>` : ''}
            ${currentRole === 'manager' && totalCollected > 0 ? `<div class="stat-mini ok"><div class="stat-mini-val">${fmtDollar(totalCollected)}</div><div class="stat-mini-lbl">TODAY $</div></div>` : ''}
            ${currentRole === 'manager' && totalDefects > 0 ? `<div class="stat-mini bad"><div class="stat-mini-val">${totalDefects}</div><div class="stat-mini-lbl">DEFECTS</div></div>` : ''}
            ${currentRole === 'manager' && pendingMaterials > 0 ? `<div class="stat-mini warn"><div class="stat-mini-val">${pendingMaterials}</div><div class="stat-mini-lbl">MATERIALS</div></div>` : ''}
            ${currentRole === 'manager' && openInspections > 0 ? `<div class="stat-mini bad"><div class="stat-mini-val">${openInspections}</div><div class="stat-mini-lbl">INSPECTIONS</div></div>` : ''}
        </div>`;

        const inactiveHtml = inactive.length === 0 ? '' : `
        <details style="margin:.5rem 0 .65rem;background:var(--surface);border:1px solid var(--hairline);border-radius:var(--r-card);overflow:hidden">
            <summary style="padding:.65rem 1rem;cursor:pointer;font-size:.82rem;color:var(--muted);list-style:none;display:flex;align-items:center;gap:.4rem;user-select:none">
                No Portal Activity (${inactive.length}) — click to expand
            </summary>
            <div style="padding:.25rem .75rem .75rem;border-top:1px solid var(--hairline)">
                ${inactive.map((i, idx) => `
                <div style="padding:.3rem 0;${idx < inactive.length - 1 ? 'border-bottom:1px solid var(--hairline);' : ''}font-size:.82rem;display:flex;justify-content:space-between;align-items:center">
                    <span>${esc(i.job.customerName || '—')}</span>
                    <span style="color:var(--muted);font-size:.75rem">Job #${esc(i.job.jobNumber || i.job.id)}</span>
                </div>`).join('')}
            </div>
        </details>`;

        content.innerHTML = dailyControlsHtml() + summaryHtml + active.map(morningCard).join('') + inactiveHtml;

    } catch(err) {
        content.innerHTML = dailyControlsHtml() + `<div class="empty-state">Error: ${esc(err.message)}</div>`;
    }
}

// ── Data enrichment — joins job_records with jobs + installers ──
async function enrichRecords(records) {
    if (records.length === 0) return records;

    const jobIds  = [...new Set(records.map(r => r.jobId).filter(Boolean))];
    const instIds = [...new Set(records.map(r => r.installerId).filter(Boolean))];
    const jobMap  = {};
    const instMap = {};

    for (let i = 0; i < jobIds.length; i += 10) {
        const snap = await db.collection('jobs')
            .where(firebase.firestore.FieldPath.documentId(), 'in', jobIds.slice(i, i + 10)).get();
        snap.docs.forEach(d => { jobMap[d.id] = d.data(); });
    }
    for (let i = 0; i < instIds.length; i += 10) {
        const snap = await db.collection('installers')
            .where(firebase.firestore.FieldPath.documentId(), 'in', instIds.slice(i, i + 10)).get();
        snap.docs.forEach(d => { instMap[d.id] = d.data(); });
    }

    return records.map(r => {
        const job  = jobMap[r.jobId]        || {};
        const inst = instMap[r.installerId] || {};
        return {
            ...r,
            customerName:  job.customerName  || r.customerName  || '—',
            jobNumber:     job.jobNumber     || r.jobNumber     || '',
            installerName: inst.displayName  || r.installerName
                           || r.signatures?.walkthrough?.installerName || '—',
            financials:    job.financials    || r.financials    || {},
            address:       job.address       || '',
            startDt:       job.startDt       || null,
            seriesId:      job.seriesId      || null,
            windowCount:   job.windowCount   ?? null,
            doorCount:     job.doorCount     ?? null,
        };
    });
}

// ── FINANCE — Running Totals Helpers ──────────────────────────
function getDateBoundaries() {
    const now        = new Date();
    const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0);
    const todayEnd   = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59);
    const dayOfWeek  = now.getDay();
    const daysToMon  = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
    const weekStart  = new Date(now.getFullYear(), now.getMonth(), now.getDate() - daysToMon, 0, 0, 0);
    const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
    const yearStart  = new Date(now.getFullYear(), 0, 1);
    return { todayStart, todayEnd, weekStart, monthStart, yearStart, now };
}

function recordAmountCollected(r) {
    if (r.status === 'completed_not_collected') return 0;
    if (r.amountCollected != null && r.amountCollected !== '') return parseFloat(r.amountCollected) || 0;
    if (r.status === 'completed_collected')  return parseFloat(r.financials?.balanceDue) || 0;
    return 0;
}

function recordDate(r) {
    if (!r.startDt) return null;
    if (r.startDt.toDate) return r.startDt.toDate();
    if (r.startDt instanceof Date) return r.startDt;
    return new Date(r.startDt);
}

function computeRunningTotals(records) {
    const { todayStart, todayEnd, weekStart, monthStart, yearStart, now } = getDateBoundaries();
    let today = 0, wtd = 0, mtd = 0, ytd = 0;
    const seenSeries = new Set();
    records.forEach(r => {
        // Deduplicate multi-day jobs — only count the contract amount once per series
        if (r.seriesId) {
            if (seenSeries.has(r.seriesId)) return;
            seenSeries.add(r.seriesId);
        }
        const amount = recordAmountCollected(r);
        if (amount <= 0) return;
        const d = recordDate(r);
        if (!d) return;
        if (d >= yearStart  && d <= now)      ytd  += amount;
        if (d >= monthStart && d <= now)      mtd  += amount;
        if (d >= weekStart  && d <= now)      wtd  += amount;
        if (d >= todayStart && d <= todayEnd) today += amount;
    });
    return { today, wtd, mtd, ytd };
}

function fmtDollar(n) {
    if (!n && n !== 0) return '$0';
    return '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

function renderRunningTotals(records, monthlyGoal, upcoming = 0) {
    const { today, wtd, mtd, ytd } = computeRunningTotals(records);
    const goalPct    = monthlyGoal > 0 ? Math.min(100, Math.round((mtd / monthlyGoal) * 100)) : null;
    const fillColor  = goalPct >= 100 ? 'var(--ok)' : 'var(--accent)';
    const projected  = mtd + upcoming;
    const projPct    = monthlyGoal > 0 ? Math.min(100, Math.round((projected / monthlyGoal) * 100)) : null;

    return `
    <div class="running-totals">
        <div class="totals-row">
            <div class="total-cell">
                <div class="total-cell-val" style="color:var(--ok)">${fmtDollar(today)}</div>
                <div class="total-cell-lbl">TODAY</div>
            </div>
            <div class="total-cell">
                <div class="total-cell-val">${fmtDollar(wtd)}</div>
                <div class="total-cell-lbl">WTD</div>
            </div>
            <div class="total-cell">
                <div class="total-cell-val">${fmtDollar(mtd)}</div>
                <div class="total-cell-lbl">MTD</div>
            </div>
            <div class="total-cell">
                <div class="total-cell-val">${fmtDollar(ytd)}</div>
                <div class="total-cell-lbl">YTD</div>
            </div>
            ${upcoming > 0 ? `
            <div class="total-cell" style="border-left:2px dashed var(--hairline);padding-left:1.25rem;opacity:.7">
                <div class="total-cell-val" style="color:var(--muted);font-style:italic">${fmtDollar(upcoming)}</div>
                <div class="total-cell-lbl" style="font-style:italic">UPCOMING ↗</div>
            </div>` : ''}
        </div>
        ${goalPct !== null ? `
        <div>
            <div style="display:flex;justify-content:space-between;font-size:.75rem;color:var(--muted);margin-bottom:.3rem">
                <span>${goalPct}% of ${fmtDollar(monthlyGoal)} goal collected${projPct !== null && upcoming > 0 ? ` · ${projPct}% projected` : ''}</span>
                <span>${fmtDollar(mtd)} collected${upcoming > 0 ? ` + ${fmtDollar(upcoming)} upcoming` : ''}</span>
            </div>
            <div class="goal-bar-track" style="position:relative">
                ${projPct !== null && upcoming > 0 ? `<div class="goal-bar-fill" style="width:${projPct}%;background:var(--hairline);position:absolute;inset:0"></div>` : ''}
                <div class="goal-bar-fill" style="width:${goalPct}%;background:${fillColor};position:relative"></div>
            </div>
        </div>` : ''}
    </div>`;
}

// ── FINANCE REPORT ────────────────────────────────────────────
async function loadFinanceReport() {
    const content = document.getElementById('report-content');
    content.innerHTML = viewControlsHtml() + '<div class="text-center p-6"><span class="spinner"></span></div>';

    try {
        if (_financeStats.length === 0) {
            content.innerHTML = viewControlsHtml() + '<div class="empty-state">No finance statuses configured.</div>';
            return;
        }

        const now        = new Date();
        const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
        const monthEnd   = new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59);

        const [recSnap, actSnap, jobsMonthSnap] = await Promise.all([
            db.collection('job_records').where('status','in',_financeStats.slice(0,30)).get(),
            db.collection('management_actions').where('type','==','finance_report').get(),
            db.collection('jobs').where('startDt','>=',monthStart).where('startDt','<=',monthEnd).get()
        ]);

        const actions = {};
        actSnap.docs.forEach(d => { actions[d.data().recordId] = { id: d.id, ...d.data() }; });

        let records = recSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        records = await enrichRecords(records);

        // Upcoming = future jobs this month with no finance-status record yet
        // Deduplicate multi-day jobs by seriesId to avoid counting same contract multiple times
        const financeJobIds = new Set(records.map(r => r.jobId).filter(Boolean));
        const todayMs = new Date().setHours(0, 0, 0, 0);
        const seenSeries = new Set();
        let upcoming = 0;
        jobsMonthSnap.docs.forEach(d => {
            if (financeJobIds.has(d.id)) return;
            const data = d.data();
            const startDt = data.startDt;
            const jobMs = startDt?.toDate ? startDt.toDate().getTime() : startDt ? new Date(startDt).getTime() : 0;
            if (jobMs < todayMs) return;
            // Skip subsequent days of the same multi-day job
            if (data.seriesId) {
                if (seenSeries.has(data.seriesId)) return;
                seenSeries.add(data.seriesId);
            }
            upcoming += parseFloat(data.financials?.balanceDue) || 0;
        });

        const totalsHtml = renderRunningTotals(records, _monthlyGoal, upcoming);

        if (activeView === 'dashboard') {
            const pending = records.filter(r => !actions[r.id]);
            content.innerHTML = viewControlsHtml() + totalsHtml + renderFinanceSections(pending, actions, false);
        } else {
            let archived = records.filter(r => actions[r.id]);
            archived = filterByDateRange(archived, actions);
            archived.sort((a,b) => {
                const at = actions[a.id]?.acknowledgedAt?.seconds || 0;
                const bt = actions[b.id]?.acknowledgedAt?.seconds || 0;
                return bt - at;
            });
            content.innerHTML = viewControlsHtml() + totalsHtml + renderFinanceSections(archived, actions, true);
        }

        document.getElementById('filter-from')?.addEventListener('change', applyDateFilter);
        document.getElementById('filter-to')?.addEventListener('change', applyDateFilter);

    } catch(err) {
        content.innerHTML = viewControlsHtml() + `<div class="empty-state">Error loading finance report: ${esc(err.message)}</div>`;
    }
}

function renderFinanceSections(records, actions, isArchive) {
    if (isArchive) {
        if (records.length === 0) return '<div class="empty-state">No archived items in this date range.</div>';
        return records.map(r => financeCard(r, actions, true)).join('');
    }

    const notCollected = records.filter(r => r.status === 'completed_not_collected');
    const partial      = records.filter(r => r.status === 'completed_partial');
    const collected    = records.filter(r => r.status === 'completed_collected');

    let html = '';
    if (notCollected.length > 0) {
        html += `<div class="section-label">Not Collected (${notCollected.length})</div>`;
        html += notCollected.map(r => financeCard(r, actions, false)).join('');
    }
    if (partial.length > 0) {
        html += `<div class="section-label">Partial (${partial.length})</div>`;
        html += partial.map(r => financeCard(r, actions, false)).join('');
    }
    if (collected.length > 0) {
        html += `<div class="section-label">Collected — Ready to Archive (${collected.length})</div>`;
        html += collected.map(r => financeCard(r, actions, false)).join('');
    }

    return html || '<div class="empty-state">✓ Nothing needs attention right now.</div>';
}

function financeCard(r, actions, isArchive) {
    const wt      = r.signatures?.walkthrough || {};
    const coc     = r.signatures?.completion  || {};
    const wtSig   = !!(wt.customerAt && wt.installerAt);
    const cocSig  = !!(coc.customerAt && coc.installerAt);
    const color   = statusColor(r.status);
    const action  = actions[r.id];

    const balanceDue    = r.financials?.balanceDue;
    const paymentMethod = r.financials?.paymentMethod || '—';
    const jobDate       = r.startDt
        ? (r.startDt.toDate ? r.startDt.toDate() : new Date(r.startDt))
            .toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})
        : '';

    // Amount collected section
    let amountSection = '';
    if (r.status === 'completed_not_collected') {
        amountSection = `<div style="font-size:.82rem;margin:.4rem 0"><strong>Collected:</strong> <span style="color:var(--muted)">$0</span></div>`;
    } else if (r.status === 'completed_collected') {
        const current = r.amountCollected != null ? r.amountCollected : (balanceDue || '');
        amountSection = `
        <div style="display:flex;align-items:center;gap:.5rem;font-size:.82rem;flex-wrap:wrap;margin:.4rem 0">
            <strong>Collected:</strong>
            <div style="display:flex;align-items:center;gap:.3rem">
                <span style="color:var(--muted)">$</span>
                <input type="number" id="amt-${r.id}" value="${esc(String(current))}" min="0" step="0.01"
                    style="width:100px;padding:.25rem .4rem;border:1px solid var(--hairline);border-radius:4px;background:var(--surface-2);color:var(--text);font-size:.82rem">
                <button class="btn btn-sm btn-secondary" onclick="setAmountCollected('${r.id}','amt-${r.id}')">Set</button>
            </div>
        </div>`;
    } else if (r.status === 'completed_partial') {
        const current = r.amountCollected != null ? r.amountCollected : '';
        amountSection = `
        <div style="display:flex;align-items:center;gap:.5rem;font-size:.82rem;flex-wrap:wrap;margin:.4rem 0">
            <strong>Collected:</strong>
            <div style="display:flex;align-items:center;gap:.3rem">
                <span style="color:var(--muted)">$</span>
                <input type="number" id="amt-${r.id}" value="${current !== '' ? esc(String(current)) : ''}" min="0" step="0.01"
                    placeholder="Enter amount"
                    style="width:120px;padding:.25rem .4rem;border:1px solid var(--hairline);border-radius:4px;background:var(--surface-2);color:var(--text);font-size:.82rem">
                <button class="btn btn-sm btn-secondary" onclick="setAmountCollected('${r.id}','amt-${r.id}')">Set</button>
            </div>
            ${balanceDue ? `<span style="color:var(--muted)">of $${esc(String(balanceDue))} due</span>` : ''}
        </div>`;
    }

    // Archive action
    let archiveSection = '';
    if (!isArchive) {
        const needsAmount = r.status === 'completed_partial' && (r.amountCollected == null || r.amountCollected === '');
        archiveSection = needsAmount
            ? `<div style="font-size:.75rem;color:var(--warn);margin-top:.5rem">⏳ Enter amount collected above before archiving.</div>`
            : `<div class="rc-actions">
                   <div class="archive-note"><input id="fn-${r.id}" placeholder="Optional note before archiving…"></div>
                   <button class="btn btn-primary btn-sm" onclick="archiveItem('${r.id}','finance_report','fn-${r.id}')">✓ Archive</button>
               </div>`;
    }

    return `
    <div class="report-card ${isArchive ? 'archived' : ''}">
        <div class="rc-header">
            <div>
                <div class="rc-name">${esc(r.customerName)}</div>
                <div class="rc-job">Job #${esc(r.jobNumber || r.jobId)} · ${esc(r.installerName)}${jobDate ? ' · ' + jobDate : ''}</div>
            </div>
            <button class="btn btn-sm btn-secondary" onclick="printJob('${r.id}')" title="View COC &amp; Walkthrough">📄 View COC/Walkthrough</button>
        </div>
        <div><span class="rc-status" style="color:${color};border-color:${color}">${esc(statusLabel(r.status))}</span></div>
        <div class="rc-sig-row">
            <div class="sig-badge ${wtSig  ? 'sig-ok' : 'sig-miss'}">${wtSig  ? '✓' : '⚠'} Walkthrough ${wtSig  ? 'Signed' : 'Not Signed'}</div>
            <div class="sig-badge ${cocSig ? 'sig-ok' : 'sig-miss'}">${cocSig ? '✓' : '⚠'} COC ${cocSig ? 'Signed' : 'Not Signed'}</div>
        </div>
        <div class="rc-body">
            <strong>Balance Due:</strong> ${balanceDue ? '$' + esc(String(balanceDue)) : '—'} &nbsp;·&nbsp;
            <strong>Payment:</strong> ${esc(String(paymentMethod))}

        </div>
        ${amountSection}
        ${isArchive
            ? `<div style="font-size:.75rem;color:var(--ok)">✓ Archived by ${esc(action?.acknowledgedByName || '—')} · ${fmtDate(action?.acknowledgedAt)}${action?.note ? ' — ' + esc(action.note) : ''}</div>`

async function setAmountCollected(recordId, inputId) {
    const input = document.getElementById(inputId);
    const value = parseFloat(input?.value);
    if (isNaN(value) || value < 0) { flash('error', 'Please enter a valid amount.'); return; }
    try {
        await db.collection('job_records').doc(recordId).update({ amountCollected: value });
        flash('ok', 'Amount saved.');
        loadFinanceReport();
    } catch(err) { flash('error', 'Could not save amount: ' + err.message); }
}

// ── SERVICE REPORT ────────────────────────────────────────────
async function loadServiceReport() {
    const content = document.getElementById('report-content');
    content.innerHTML = viewControlsHtml() + '<div class="text-center p-6"><span class="spinner"></span></div>';

    try {
        const today = new Date().toISOString().slice(0, 10);
        const queries = [
            db.collection('job_records').get(),
            db.collection('management_actions').where('type','==','service_report').get()
        ];
        if (activeView === 'dashboard') {
            queries.push(db.collection('reminders')
                .where('reminderDate','==',today)
                .where('status','==','pending')
                .get());
        }
        const results  = await Promise.all(queries);
        const [allRecSnap, actSnap, remSnap] = results;

        const actions = {};
        actSnap.docs.forEach(d => { actions[d.data().recordId] = { id: d.id, ...d.data() }; });

        let records = allRecSnap.docs
            .map(d => ({ id: d.id, ...d.data() }))
            .filter(r =>
                _serviceStats.includes(r.status) ||
                (r.openings || []).some(o => (o.defects || []).length > 0)
            );
        records = await enrichRecords(records);

        if (activeView === 'dashboard') {
            const reminders = remSnap ? remSnap.docs.map(d => ({ id: d.id, ...d.data() })) : [];
            content.innerHTML = viewControlsHtml() + renderServiceDashboard(records, actions, reminders);
        } else {
            let archived = records.filter(r => actions[r.id]);
            archived = filterByDateRange(archived, actions);
            archived.sort((a,b) => {
                const at = actions[a.id]?.acknowledgedAt?.seconds || 0;
                const bt = actions[b.id]?.acknowledgedAt?.seconds || 0;
                return bt - at;
            });
            content.innerHTML = viewControlsHtml() + renderServiceArchive(archived, actions);
        }

        document.getElementById('filter-from')?.addEventListener('change', applyDateFilter);
        document.getElementById('filter-to')?.addEventListener('change', applyDateFilter);

    } catch(err) {
        content.innerHTML = viewControlsHtml() + `<div class="empty-state">Error loading service report: ${esc(err.message)}</div>`;
    }
}

function renderServiceDashboard(records, actions, reminders) {
    let html = renderFollowUpSection(reminders);

    const pending  = records.filter(r => !actions[r.id]);
    const activeDefects  = [];
    const trackedDefects = [];
    const needService    = [];
    const inspectionReady = [];

    pending.forEach(r => {
        (r.openings || []).forEach((o, oi) => {
            (o.defects || []).forEach((d, di) => {
                if (d.clearedAt) return;
                const item = { r, openingIdx: oi, defectIdx: di, openingLabel: o.label || o.type || 'Opening', d };
                if (d.tracked) trackedDefects.push(item);
                else           activeDefects.push(item);
            });
        });
        if (_serviceStats.includes(r.status))  needService.push(r);
        if (_financeStats.includes(r.status))  inspectionReady.push(r);
    });

    if (activeDefects.length > 0) {
        html += `<div class="section-label">Defects (${activeDefects.length})</div>`;
        html += activeDefects.map(item => defectActionCard(item, false)).join('');
    }
    if (trackedDefects.length > 0) {
        html += `<div class="section-label">Tracking (${trackedDefects.length})</div>`;
        html += trackedDefects.map(item => defectActionCard(item, true)).join('');
    }
    if (needService.length > 0) {
        html += `<div class="section-label">Needs Service (${needService.length})</div>`;
        html += needService.map(r => serviceCard(r, actions, false)).join('');
    }
    if (inspectionReady.length > 0) {
        html += `<div class="section-label">Ready for Inspection (${inspectionReady.length})</div>`;
        html += inspectionReady.map(r => serviceCard(r, actions, false)).join('');
    }

    return html || '<div class="empty-state">✓ Nothing needs attention right now.</div>';
}

function renderServiceArchive(records, actions) {
    if (records.length === 0) return '<div class="empty-state">No archived items in this date range.</div>';
    return records.map(r => serviceCard(r, actions, true)).join('');
}

async function clearDefect(recordId, openingIdx, defectIdx) {
    try {
        const recRef = db.collection('job_records').doc(recordId);
        const recDoc = await recRef.get();
        if (!recDoc.exists) { flash('error', 'Record not found.'); return; }
        const openings = recDoc.data().openings ? JSON.parse(JSON.stringify(recDoc.data().openings)) : [];
        if (!openings[openingIdx]?.defects?.[defectIdx]) { flash('error', 'Defect not found.'); return; }
        openings[openingIdx].defects[defectIdx] = {
            ...openings[openingIdx].defects[defectIdx],
            clearedAt: new Date().toISOString(),
            clearedBy: currentUser.uid,
            clearedByName: currentUser.displayName || currentUser.email
        };
        await recRef.update({ openings });
        flash('ok', 'Defect marked as cleared.');
        loadServiceReport();
    } catch(err) { flash('error', 'Could not clear defect: ' + err.message); }
}

async function trackDefect(recordId, openingIdx, defectIdx, noteInputId) {
    const note = (document.getElementById(noteInputId)?.value || '').trim();
    try {
        const recRef = db.collection('job_records').doc(recordId);
        const recDoc = await recRef.get();
        if (!recDoc.exists) { flash('error', 'Record not found.'); return; }
        const openings = recDoc.data().openings ? JSON.parse(JSON.stringify(recDoc.data().openings)) : [];
        if (!openings[openingIdx]?.defects?.[defectIdx]) { flash('error', 'Defect not found.'); return; }
        openings[openingIdx].defects[defectIdx] = {
            ...openings[openingIdx].defects[defectIdx],
            tracked: true,
            trackingNote: note,
            trackedAt: new Date().toISOString(),
            trackedBy: currentUser.uid,
            trackedByName: currentUser.displayName || currentUser.email
        };
        await recRef.update({ openings });
        flash('ok', 'Defect added to tracking.');
        loadServiceReport();
    } catch(err) { flash('error', 'Could not track defect: ' + err.message); }
}

async function reorderDefect(recordId, openingIdx, defectIdx) {
    try {
        const recRef = db.collection('job_records').doc(recordId);
        const recDoc = await recRef.get();
        if (!recDoc.exists) { flash('error', 'Record not found.'); return; }
        const rec      = { id: recDoc.id, ...recDoc.data() };
        const openings = rec.openings || [];
        const defect   = openings[openingIdx]?.defects?.[defectIdx];
        if (!defect) { flash('error', 'Defect not found.'); return; }
        const openingLabel = openings[openingIdx]?.label || openings[openingIdx]?.type || 'Opening';

        let jobData = {};
        if (rec.jobId) {
            try {
                const jobDoc = await db.collection('jobs').doc(rec.jobId).get();
                if (jobDoc.exists) jobData = jobDoc.data();
            } catch(e) {}
        }

        // Prevent duplicate re-orders for the same defect
        if (defect.reorderedAt) {
            flash('error', 'A re-order has already been created for this defect.');
            return;
        }

        await db.collection('material_orders').add({
            material:      defect.typeName || defect.type || 'Unknown material',
            jobId:         rec.jobId        || '',
            jobNumber:     jobData.jobNumber || rec.jobNumber || '',
            customerName:  jobData.customerName || rec.customerName || '',
            installerId:   rec.installerId  || '',
            installerName: rec.installerName || jobData.installerName || '',
            defectType:    defect.type      || '',
            defectDesc:    defect.description || '',
            openingLabel:  openingLabel,
            status:        'pending',
            notes:         '',
            createdAt:     firebase.firestore.FieldValue.serverTimestamp(),
            createdBy:     currentUser.uid,
            createdByName: currentUser.displayName || currentUser.email,
            orderedAt:     null,
            completedAt:   null
        });

        // Mark the defect as re-ordered so the button is disabled on reload
        const updatedOpenings = JSON.parse(JSON.stringify(openings));
        updatedOpenings[openingIdx].defects[defectIdx] = {
            ...defect,
            reorderedAt:     new Date().toISOString(),
            reorderedBy:     currentUser.uid,
            reorderedByName: currentUser.displayName || currentUser.email
        };
        await recRef.update({ openings: updatedOpenings });

        flash('ok', 'Material re-order created. Check the Materials tab.');
        loadServiceReport();
    } catch(err) { flash('error', 'Could not create re-order: ' + err.message); }
}

// ── MATERIALS TAB ─────────────────────────────────────────────
async function loadMaterialsTab() {
    const content = document.getElementById('report-content');
    content.innerHTML = '<div class="text-center p-6"><span class="spinner"></span></div>';

    try {
        const snap = await db.collection('material_orders').orderBy('createdAt', 'desc').get();
        const orders = snap.docs.map(d => ({ id: d.id, ...d.data() }));

        const pending  = orders.filter(o => o.status === 'pending');
        const ordered  = orders.filter(o => o.status === 'ordered');
        const complete = orders.filter(o => o.status === 'complete');

        let html = '';

        if (pending.length > 0) {
            html += `<div class="section-label">Pending (${pending.length})</div>`;
            html += pending.map(o => materialCard(o)).join('');
        }
        if (ordered.length > 0) {
            html += `<div class="section-label">Ordered (${ordered.length})</div>`;
            html += ordered.map(o => materialCard(o)).join('');
        }
        if (complete.length > 0) {
            html += `
            <details style="margin:.5rem 0;background:var(--surface);border:1px solid var(--hairline);border-radius:var(--r-card);overflow:hidden;opacity:.6">
                <summary style="padding:.65rem 1rem;cursor:pointer;font-size:.82rem;color:var(--muted);list-style:none;display:flex;align-items:center;gap:.4rem;user-select:none">
                    Complete (${complete.length}) — click to expand
                </summary>
                <div style="padding:.25rem .75rem .75rem;border-top:1px solid var(--hairline)">
                    ${complete.map(o => materialCard(o, true)).join('')}
                </div>
            </details>`;
        }

        content.innerHTML = html || '<div class="empty-state">No material orders yet.</div>';
    } catch(err) {
        content.innerHTML = `<div class="empty-state">Error loading materials: ${esc(err.message)}</div>`;
    }
}

function materialCard(o, isComplete = false) {
    const createdAt  = o.createdAt?.toDate ? o.createdAt.toDate() : (o.createdAt ? new Date(o.createdAt) : null);
    const orderedAt  = o.orderedAt?.toDate ? o.orderedAt.toDate() : (o.orderedAt ? new Date(o.orderedAt) : null);
    const createdStr = createdAt ? createdAt.toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '';
    const orderedStr = orderedAt ? orderedAt.toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '';

    return `
    <div class="report-card${isComplete ? ' archived' : ''}">
        <div class="rc-header">
            <div>
                <div class="rc-name">${esc(o.material || 'Unknown material')}</div>
                <div class="rc-job">Job #${esc(o.jobNumber || o.jobId || '—')} · ${esc(o.customerName || '—')} · ${esc(o.installerName || '—')}</div>
            </div>
            ${o.defectType ? `<span style="font-size:.72rem;padding:.15rem .5rem;border:1px solid var(--hairline);color:var(--muted);border-radius:4px">${esc(o.defectType)}</span>` : ''}
        </div>
        ${o.defectDesc  ? `<div class="rc-body">${esc(o.defectDesc)}</div>` : ''}
        ${o.openingLabel ? `<div style="font-size:.78rem;color:var(--muted);margin-bottom:.3rem">Opening: ${esc(o.openingLabel)}</div>` : ''}
        <div style="font-size:.75rem;color:var(--muted);margin-bottom:.5rem">
            Reported: ${createdStr || '—'} · By: ${esc(o.createdByName || '—')}${orderedStr ? ` · Ordered: ${orderedStr}` : ''}
        </div>
        ${o.notes ? `<div style="font-size:.8rem;background:var(--surface-2);padding:.4rem .6rem;border-radius:4px;margin-bottom:.5rem">${esc(o.notes)}</div>` : ''}
        ${!isComplete ? `
        <div style="display:flex;gap:.5rem;flex-wrap:wrap;align-items:center">
            ${o.status === 'pending' ? `<button class="btn btn-primary btn-sm" onclick="markOrdered('${o.id}')">✓ Mark Ordered</button>` : ''}
            ${o.status === 'ordered' ? `<button class="btn btn-primary btn-sm" onclick="markReceived('${o.id}')">✓ Mark Received</button>` : ''}

                <button class="btn btn-sm btn-ghost" onclick="saveMaterialNote('${o.id}','mn-${o.id}')">Save</button>
            </div>
        </div>` : ''}
    </div>`;
}

// ── Helpers ───────────────────────────────────────────────────
function filterByDateRange(records, actions) {
    if (!archiveFrom && !archiveTo) return records;
    return records.filter(r => {
        const action = actions[r.id];
        if (!action?.acknowledgedAt) return false;
        const d = action.acknowledgedAt.toDate ? action.acknowledgedAt.toDate() : new Date(action.acknowledgedAt);
        const ds = d.toISOString().slice(0,10);
        if (archiveFrom && ds < archiveFrom) return false;
        if (archiveTo   && ds > archiveTo)   return false;
        return true;
    });
}

function fmtDate(ts) {
    if (!ts) return '—';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function loadAnalyticsReport() {

            <input type="date" class="form-input" id="analytics-from" value="${monthStart}"
                   style="font-size:.85rem;padding:.35rem .6rem" onchange="runAnalytics()">
        </div>

            <label style="font-size:.75rem;display:block;margin-bottom:.25rem;color:var(--muted)">To</label>
            <input type="date" class="form-input" id="analytics-to" value="${today}"
                   style="font-size:.85rem;padding:.35rem .6rem" onchange="runAnalytics()">
        </div>
    </div>
