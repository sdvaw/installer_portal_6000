<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Armor Vue — Job Documents</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="/js/firebase-config.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 13px;
    color: #1a1a1a;
    background: #f5f5f5;
    padding: 24px;
  }

  /* ── Loading / Error ── */
  #loading, #error-msg {
    text-align: center;
    padding: 60px 20px;
    font-size: 1rem;
    color: #555;
  }
  #error-msg { color: #c0392b; }

  /* ── Print toolbar (screen only) ── */
  #print-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    max-width: 760px;
    margin: 0 auto 20px;
  }
  #print-bar button {
    padding: 8px 20px;
    background: #1a6cf6;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 600;
  }
  #print-bar button:hover { background: #1558d0; }
  #print-bar .back-link {
    font-size: 13px;
    color: #1a6cf6;
    text-decoration: none;
    cursor: pointer;
  }
  #print-bar .back-link:hover { text-decoration: underline; }

  /* ── Document wrapper ── */
  #doc-wrap {
    max-width: 760px;
    margin: 0 auto;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    overflow: hidden;
  }

  /* ── Header band ── */
  .doc-header {
    background: #1a1a2e;
    color: #fff;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .doc-header .brand { font-size: 1.2rem; font-weight: 700; letter-spacing: .04em; }
  .doc-header .doc-type { font-size: .8rem; opacity: .75; margin-top: 2px; }
  .doc-header .job-ref { text-align: right; font-size: .8rem; opacity: .85; }
  .doc-header .job-ref strong { font-size: 1rem; display: block; }

  /* ── Job info row ── */
  .job-info {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    border-bottom: 1px solid #e8e8e8;
  }
  .job-info-cell {
    padding: 12px 20px;
    border-right: 1px solid #e8e8e8;
  }
  .job-info-cell:last-child { border-right: none; }
  .ji-label { font-size: .7rem; text-transform: uppercase; letter-spacing: .05em; color: #888; margin-bottom: 3px; }
  .ji-value { font-size: .9rem; font-weight: 600; }

  /* ── Section ── */
  .section {
    padding: 20px 24px;
    border-bottom: 1px solid #e8e8e8;
  }
  .section:last-child { border-bottom: none; }
  .section-title {
    font-size: .75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: #555;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #e8e8e8;
  }

  /* ── Checklist ── */
  .checklist { list-style: none; }
  .checklist li {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 5px 0;
    font-size: .85rem;
    border-bottom: 1px dotted #eee;
  }
  .checklist li:last-child { border-bottom: none; }
  .check-icon {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 1px;
    font-size: .65rem;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
  }
  .check-icon.done { background: #27ae60; color: #fff; }
  .check-icon.skip { background: #e0e0e0; color: #999; }
  .check-time { margin-left: auto; font-size: .7rem; color: #999; white-space: nowrap; }

  /* ── Agreement text ── */
  .agreement-text {
    font-size: .85rem;
    line-height: 1.6;
    color: #333;
    background: #f9f9f9;
    border: 1px solid #e8e8e8;
    border-radius: 6px;
    padding: 14px 16px;
    white-space: pre-wrap;
  }

  /* ── Rating stars ── */
  .rating-row {
    display: flex;
    gap: 24px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .rating-item { font-size: .82rem; }
  .rating-label { color: #666; margin-bottom: 3px; }
  .stars { color: #f39c12; font-size: 1rem; letter-spacing: 1px; }

  /* ── Signature blocks ── */
  .sig-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 18px;
  }
  .sig-block { }
  .sig-party {
    font-size: .7rem;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: #888;
    margin-bottom: 6px;
  }
  .sig-img-wrap {
    border: 1px solid #ddd;
    border-radius: 6px;
    background: #fafafa;
    height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .sig-img-wrap img {
    max-height: 80px;
    max-width: 100%;
    object-fit: contain;
  }
  .sig-no-sig {
    font-size: .75rem;
    color: #bbb;
    font-style: italic;
  }
  .sig-meta {
    margin-top: 6px;
    font-size: .75rem;
    color: #555;
  }
  .sig-meta strong { color: #1a1a1a; }

  /* ── Customer note ── */
  .customer-note {
    margin-top: 12px;
    font-size: .83rem;
    color: #555;
    background: #fffbea;
    border-left: 3px solid #f39c12;
    padding: 8px 12px;
    border-radius: 0 4px 4px 0;
  }

  /* ── Incomplete badge ── */
  .incomplete-badge {
    display: inline-block;
    background: #fff3cd;
    color: #856404;
    border: 1px solid #ffc107;
    border-radius: 4px;
    padding: 2px 8px;
    font-size: .72rem;
    font-weight: 600;
    margin-left: 8px;
    vertical-align: middle;
  }

  /* ── Footer ── */
  .doc-footer {
    background: #f9f9f9;
    border-top: 1px solid #e8e8e8;
    padding: 10px 24px;
    font-size: .72rem;
    color: #aaa;
    text-align: center;
  }

  /* ── Print styles ── */
  @media print {
    body { background: #fff; padding: 0; font-size: 12px; }
    #print-bar { display: none !important; }
    #doc-wrap {
      max-width: 100%;
      border: none;
      border-radius: 0;
      box-shadow: none;
    }
    .sig-img-wrap { break-inside: avoid; }
    .section { break-inside: avoid; }
    .doc-header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>

<div id="loading">Loading document…</div>
<div id="error-msg" style="display:none"></div>

<div id="print-bar" style="display:none">
  <button onclick="window.print()">🖨 Print / Save PDF</button>
  <a class="back-link" onclick="window.close()">← Close</a>
</div>

<div id="doc-wrap" style="display:none"></div>

<script>
const params   = new URLSearchParams(location.search);
const recordId = params.get('recordId');

function showError(msg) {
    document.getElementById('loading').style.display = 'none';
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = '';
}

function esc(s) {
    if (s == null) return '';
    return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(val) {
    if (!val) return '—';
    const d = val.toDate ? val.toDate() : new Date(val);
    return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}

function fmtDateTime(val) {
    if (!val) return '—';
    const d = val.toDate ? val.toDate() : new Date(val);
    return d.toLocaleString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit' });
}

function stars(n) {
    if (!n) return '—';
    return '★'.repeat(n) + '☆'.repeat(5 - n);
}

function renderDoc(rec, job, cocText) {
    const sigs  = rec.signatures || {};
    const wt    = sigs.walkthrough || {};
    const coc   = sigs.completion  || {};
    const fin   = rec.financials   || job?.financials || {};
    const checklist = rec.walkthroughChecklist || [];

    const amount = fin.balanceDue || '0.00';
    const agreementText = cocText
        ? cocText.replace('{AMOUNT}', '$' + amount)
        : '';

    const WALKTHROUGH_ITEMS = [
        { id:'item_01', label:'Installer walked the job with customer' },
        { id:'item_02', label:'Checked all windows & doors for correct screw pattern' },
        { id:'item_03', label:'Inspected interior/exterior caulking & stucco' },
        { id:'item_04', label:'All job debris cleaned and removed' },
        { id:'item_05', label:'No gaps in any windows or doors' },
        { id:'item_06', label:'All screens are in good condition' },
        { id:'item_07', label:'Permit is on site' },
        { id:'item_08', label:'Stickers are left on all windows and doors' },
        { id:'item_09', label:'Windows are clean' },
        { id:'item_10', label:'Final payment has been made' },
        { id:'item_11', label:'All caps and covers to remain next to windows' },
        { id:'item_12', label:'Customer notified re: inspection packet' }
    ];

    // Build checklist lookup by item id
    const checkMap = {};
    checklist.forEach(c => { checkMap[c.itemId] = c; });

    const checklistHtml = WALKTHROUGH_ITEMS.map(item => {
        const done = !!checkMap[item.id];
        const ts   = done && checkMap[item.id].acknowledgedAt
            ? '<span class="check-time">' + esc(fmtDateTime(checkMap[item.id].acknowledgedAt)) + '</span>'
            : '';
        return `<li>
            <span class="check-icon ${done ? 'done' : 'skip'}">${done ? '✓' : '–'}</span>
            <span>${esc(item.label)}</span>
            ${ts}
        </li>`;
    }).join('');

    const incBadge = rec.walkthroughIncomplete
        ? '<span class="incomplete-badge">Incomplete</span>'
        : '';

    const custNote = rec.walkthroughCustomerNote
        ? `<div class="customer-note"><strong>Customer Note:</strong> ${esc(rec.walkthroughCustomerNote)}</div>`
        : '';

    function sigBlock(party, url, name, at) {
        const imgHtml = url
            ? `<img src="${esc(url)}" alt="${esc(party)} signature">`
            : `<span class="sig-no-sig">No signature captured</span>`;
        return `<div class="sig-block">
            <div class="sig-party">${esc(party)}</div>
            <div class="sig-img-wrap">${imgHtml}</div>
            <div class="sig-meta">
                <strong>${esc(name || '—')}</strong><br>
                ${esc(at ? fmtDateTime(at) : '—')}
            </div>
        </div>`;
    }

    // Rating section (only if COC was rated)
    const rating = rec.cocRating;
    const ratingHtml = rating ? `
        <div class="rating-row">
            <div class="rating-item">
                <div class="rating-label">Product Quality</div>
                <div class="stars">${esc(stars(rating.product))}</div>
            </div>
            <div class="rating-item">
                <div class="rating-label">Sales Experience</div>
                <div class="stars">${esc(stars(rating.sales))}</div>
            </div>
            <div class="rating-item">
                <div class="rating-label">Installation</div>
                <div class="stars">${esc(stars(rating.install))}</div>
            </div>
        </div>` : '';

    // Job date
    const jobDate = job?.startDt ? fmtDate(job.startDt) : '—';
    const installerName = rec.installerName || '—';

    document.getElementById('doc-wrap').innerHTML = `
        <div class="doc-header">
            <div>
                <div class="brand">ARMOR VUE</div>
                <div class="doc-type">Field Documentation Package</div>
            </div>
            <div class="job-ref">
                <strong>Job #${esc(rec.jobNumber || rec.jobId)}</strong>
                ${esc(jobDate)}
            </div>
        </div>

        <div class="job-info">
            <div class="job-info-cell">
                <div class="ji-label">Customer</div>
                <div class="ji-value">${esc(rec.customerName || job?.customerName || '—')}</div>
            </div>
            <div class="job-info-cell">
                <div class="ji-label">Address</div>
                <div class="ji-value">${esc((job?.address || '—').replace(/\n/g,' '))}</div>
            </div>
            <div class="job-info-cell">
                <div class="ji-label">Installer</div>
                <div class="ji-value">${esc(installerName)}</div>
            </div>
        </div>

        <!-- Walkthrough Checklist -->
        <div class="section">
            <div class="section-title">Field Inspection Checklist ${incBadge}</div>
            <ul class="checklist">${checklistHtml}</ul>
            ${custNote}
            <div class="sig-row">
                ${sigBlock('Customer', wt.customerUrl, wt.customerName, wt.customerAt)}
                ${sigBlock('Installer', wt.installerUrl, wt.installerName, wt.installerAt)}
            </div>
        </div>

        <!-- Certificate of Completion -->
        <div class="section">
            <div class="section-title">Certificate of Completion</div>
            ${ratingHtml}
            ${agreementText ? `<div class="agreement-text">${esc(agreementText)}</div>` : ''}
            <div class="sig-row">
                ${sigBlock('Customer', coc.customerUrl, coc.customerName, coc.customerAt)}
                ${sigBlock('Installer', coc.installerUrl, coc.installerName, coc.installerAt)}
            </div>
        </div>

        <div class="doc-footer">
            Armor Vue · Generated ${new Date().toLocaleString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit' })}
        </div>
    `;

    document.getElementById('loading').style.display  = 'none';
    document.getElementById('doc-wrap').style.display = '';
    document.getElementById('print-bar').style.display = '';
    document.title = `Armor Vue — Job #${rec.jobNumber || rec.jobId}`;
}

async function loadDoc() {
    if (!recordId) { showError('No record ID specified.'); return; }

    auth.onAuthStateChanged(async user => {
        if (!user) {
            showError('You must be signed in to view this document.');
            return;
        }

        // Verify management user
        const mgmtSnap = await db.collection('management_users').doc(user.uid).get();
        if (!mgmtSnap.exists || mgmtSnap.data().status !== 'active') {
            showError('Access denied. Management account required.');
            return;
        }

        try {
            const [recSnap, settingsSnap] = await Promise.all([
                db.collection('job_records').doc(recordId).get(),
                db.collection('settings').doc('portal').get()
            ]);

            if (!recSnap.exists) { showError('Job record not found.'); return; }

            const rec     = { id: recSnap.id, ...recSnap.data() };
            const cocText = settingsSnap.exists ? (settingsSnap.data().cocAgreementText || '') : '';

            // Load job doc for address / date
            let job = null;
            if (rec.jobId) {
                const jobSnap = await db.collection('jobs').doc(rec.jobId).get();
                if (jobSnap.exists) job = jobSnap.data();
            }

            renderDoc(rec, job, cocText);
        } catch (err) {
            showError('Error loading document: ' + err.message);
        }
    });
}

loadDoc();
</script>
</body>
</html>
